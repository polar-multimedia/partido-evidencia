<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Control · El Partido de la Evidencia</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  html{background:#0a0e15}
  body{background:transparent}
  #bgloop{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;opacity:.35}
  #bgveil{position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(8,11,17,.72),rgba(8,11,17,.88))}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:16px;gap:12px}
  .hdr{display:flex;align-items:center;justify-content:space-between}
  .hdr .brand{font-size:15px}
  .statebox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
  .statebox .tag{margin-bottom:4px}
  .statebox .st{font-size:26px;font-weight:900}
  .statebox .caso{color:var(--muted);font-size:14px;margin-top:2px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
  .stat .n{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .row{display:flex;gap:10px}
  .row .btn{flex:1}
  .mini{font-size:14px;padding:11px 14px;border-radius:11px}
  .cfg{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;font-size:14px}
  .cfg input{width:66px;padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-family:inherit}
  .varbox{background:rgba(232,85,77,.12);border:1px solid rgba(232,85,77,.5);border-radius:12px;padding:12px;text-align:center;font-weight:800;color:#ffb4ae}
  .danger{color:var(--red);border-color:rgba(232,85,77,.4) !important}
  details{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:13px}
  summary{cursor:pointer;color:var(--muted)}
  #cfgnote{text-align:center;color:var(--muted);font-size:11px}
  #roster{display:flex;gap:10px;margin-top:2px}
  #roster:empty{display:none}
  .rostercol{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .rostercol .rh{font-weight:800;font-size:13px;margin-bottom:6px}
  .rostercol ul{margin:0;padding-left:18px;font-size:13px}
  .rostercol li{margin-bottom:3px}
  .teal{color:var(--teal)} .green{color:var(--green)}
  /* Botones más grandes y legibles */
  .actions .btn{font-size:19px;font-weight:800;padding:17px 20px;border-radius:14px;line-height:1.2}
  .actions .btn.lg{font-size:22px;padding:20px 22px}
  .actions .btn.ghost{background:rgba(15,22,32,.92);border:1px solid #34485e;color:#fff;box-shadow:none}
  .actions .btn.ghost:hover{border-color:var(--teal)}
  .actions .btn.mini{font-size:15px;padding:13px 16px}
  .actions .btn.primary{font-size:26px;padding:26px 22px;box-shadow:0 8px 28px rgba(140,224,33,.35);margin-bottom:4px}
  .actions .sep{height:1px;background:var(--line);margin:6px 0 2px}
  .statebox{background:rgba(18,26,38,.94)}
  .statebox .st{font-size:28px}
  .stat{background:rgba(15,22,32,.92)}
  .cfg, details, .rostercol{background:rgba(15,22,32,.92)}
</style>
</head><body>
<video id="bgloop" src="../assets/loop.mp4" autoplay loop muted playsinline></video>
<div id="bgveil"></div>
<div id="app">
  <div class="hdr">
    <div class="brand">🎛️ Control <span class="kc">· Partido de la Evidencia</span></div>
    <span class="tag" id="conn">···</span>
  </div>
  <div id="ponenteTag" style="text-align:center;font-weight:800;font-size:14px;background:rgba(25,195,214,.14);border:1px solid rgba(25,195,214,.4);border-radius:10px;padding:8px"></div>
  <div class="statebox">
    <div class="tag">Estado actual</div>
    <div class="st" id="stName">—</div>
    <div class="caso" id="stCaso"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" id="nConn">0</div><div class="l">Conectados</div></div>
    <div class="stat"><div class="n" id="nRap" style="color:var(--teal)">0</div><div class="l">⚡ Rápido</div></div>
    <div class="stat"><div class="n" id="nCon" style="color:var(--green)">0</div><div class="l">🛡️ Control</div></div>
  </div>
  <button class="btn ghost mini" id="rosterBtn" onclick="toggleRoster()">👥 Ver integrantes de los equipos</button>
  <div id="roster"></div>
  <div id="varInfo"></div>
  <div class="actions" id="actions"></div>
  <div class="cfg">⏱ Duración por pregunta
    <input id="dur" type="number" min="5" max="120" value="15"> seg</div>
  <details><summary>Herramientas</summary>
    <div class="actions" style="margin-top:10px">
      <button class="btn ghost mini" onclick="exportar()">⬇️ Exportar analítica (JSON)</button>
      <button class="btn ghost mini" onclick="atras()">↩️ Atrás (corregir estado)</button>
      <button class="btn ghost mini danger" onclick="reiniciar()">🗑️ Reiniciar evento</button>
    </div>
  </details>
  <div id="cfgnote"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="../assets/firebase.js"></script>
<script src="../assets/common.js"></script>
<script src="../assets/cases.js"></script>
<script>
const ST_NOMBRE = {lobby:"Lobby / Registro",cortinilla:"Cortinilla",pregunta:"Pregunta (sin opciones)",
  opciones:"Opciones (lee el ponente)",responder:"Respondiendo ⏱",bloqueo:"Bloqueo",
  resultado:"Resultado / Gol",var:"VAR de la evidencia",cierre:"Cierre",final:"Final / Campeón",despedida:"Despedida",penintro:"Vamos a penales"};
let EV={estado:"lobby",caso_actual:1}, JUG={}, VARS={}, ready=false;

function esUltimo(){ return (EV.caso_actual||1) >= CASOS.length; }
function jugN(eq){ return Object.values(JUG).filter(j=>j.equipo===eq).length; }
function enPenales(){ return EV.modo==="penales"; }
function casoMod(){ return CASOS.find(x=>x.id===(EV.caso_actual||1)) || CASOS[0]; }
function preg(){ return enPenales() ? (PENALES[(EV.penal||1)-1]) : casoMod(); }
function qKey(){ return enPenales() ? ("P"+(EV.penal||1)) : (EV.caso_actual||1); }
function setEstado(e, extra){ if(ready) db.ref("evento").update(Object.assign({estado:e, mostrar_contexto:false, mostrar_qr:false, presentacion:null}, extra||{})); }
function toggleContexto(){ if(ready) db.ref("evento").update({ mostrar_contexto:!EV.mostrar_contexto, ctx_slide:0 }); }
function lanzarOverlay(which){ // loop_full | musica | empate (mutuamente excluyentes)
  if(!ready) return;
  const estaba = which==="loop_full"?EV.loop_full : which==="musica"?EV.musica : EV.empate;
  const upd = { loop_full:false, musica:false, empate:false, presentacion:null };
  if(!estaba) upd[which]=true;
  db.ref("evento").update(upd);
}
function lanzarPresentacion(){ if(!ready) return;
  db.ref("evento").update({ presentacion: EV.presentacion?null:EV.ponente, loop_full:false, musica:false, empate:false });
}

function abrirRespuestas(){
  const dur = Math.max(5, parseInt(document.getElementById("dur").value)||25);
  db.ref("var_solicitudes").remove();
  setEstado("responder", { cronometro:{ inicio:serverNow(), duracion:dur, corriendo:true } });
}
function cerrarTiempo(){
  const c = EV.cronometro||{}; c.corriendo=false;
  setEstado("bloqueo", { cronometro:c });
}
function irAPenales(){ // forzar empate -> video "vamos a penales" -> penales
  db.ref("evento").update({ modo:"penales", penal:1, estado:"penintro", empate:true, gol_ronda:null, loop_full:false, musica:false });
}
function siguiente(){
  db.ref("var_solicitudes").remove();
  if(enPenales()){
    if((EV.penal||1) >= PENALES.length){ setEstado("final"); return; }
    db.ref("evento").update({ estado:"pregunta", penal:(EV.penal||1)+1, empate:false, gol_ronda:null });
    return;
  }
  if(esUltimo()){ irAPenales(); return; }
  db.ref("evento").update({ estado:"cortinilla", caso_actual:(EV.caso_actual||1)+1 });
}

/* --- Cálculo de puntaje (idempotente). Casos y penales. --- */
function revelar(){
  const key = qKey(); const c = preg(); const pen = enPenales();
  db.ref("scored/"+key).once("value").then(sn=>{
    if(sn.val()){ setEstado("resultado"); return; }
    Promise.all([ db.ref("respuestas/"+key).once("value"), db.ref("equipos").once("value") ])
    .then(([rs,es])=>{
      const resp = rs.val()||{};
      const eq = es.val()||{};
      eq.rapido = eq.rapido||{puntaje:0,racha:0}; eq.control = eq.control||{puntaje:0,racha:0};
      const dur=(EV.cronometro&&EV.cronometro.duracion)||25;
      const inicio=(EV.cronometro&&EV.cronometro.inicio)||0;
      const add={rapido:0,control:0}, correctos={rapido:0,control:0};
      const st={rapido:{n:0,ok:0,vel:0},control:{n:0,ok:0,vel:0}};
      const updates={};
      Object.entries(resp).forEach(([uid,r])=>{
        const ok = esCorrecta(c, r.opcion);
        const tRest = Math.max(0, dur-((r.ts-inicio)/1000));
        const racha = (eq[r.equipo]||{}).racha||0;
        const pts = calcPuntos(ok, tRest, dur, racha);
        updates[`respuestas/${key}/${uid}/correcta`]=ok;
        updates[`respuestas/${key}/${uid}/puntos`]=pts;
        if(add[r.equipo]!==undefined){
          if(ok){ add[r.equipo]+=pts; correctos[r.equipo]++; }
          st[r.equipo].n++; if(ok) st[r.equipo].ok++; st[r.equipo].vel += dur? Math.max(0,tRest)/dur : 0;
        }
      });
      ["rapido","control"].forEach(t=>{
        eq[t].puntaje=(eq[t].puntaje||0)+add[t];
        eq[t].racha = correctos[t]>0 ? ((eq[t].racha||0)+1) : 0;
      });
      const gol = add.rapido>add.control ? "rapido" : (add.control>add.rapido ? "control" : "empate");
      if(pen){
        if(gol==="rapido"||gol==="control"){ eq[gol].penales = (eq[gol].penales||0)+1; }
        const ps={};
        ["rapido","control"].forEach(t=>{ ps[t]={ aciertos: st[t].n?Math.round(100*st[t].ok/st[t].n):0, velocidad: st[t].n?Math.round(100*st[t].vel/st[t].n):0, n:st[t].n }; });
        updates["evento/penal_stats"]=ps;
      } else {
        if(gol==="rapido"||gol==="control"){ eq[gol].goles = (eq[gol].goles||0)+1; }
      }
      updates["equipos"]=eq; updates["scored/"+key]=true; updates["evento/gol_ronda"]=gol;
      db.ref().update(updates).then(()=>setEstado("resultado"));
    });
  });
}

let rosterOpen = false;
function toggleRoster(){ rosterOpen = !rosterOpen; renderRoster(); }
function renderRoster(){
  const el = document.getElementById("roster"); if(!el) return;
  const btn = document.getElementById("rosterBtn");
  if(btn) btn.textContent = rosterOpen ? "👥 Ocultar integrantes" : "👥 Ver integrantes de los equipos";
  if(!rosterOpen){ el.innerHTML = ""; return; }
  const list = eq => Object.values(JUG).filter(j=>j.equipo===eq)
    .map(j=>`<li>${escapeHTML(j.nombre||"—")}${j.conectado===false?' <span class="muted">(offline)</span>':''}</li>`).join("")
    || '<li class="muted">Sin jugadores</li>';
  el.innerHTML = `<div class="rostercol"><div class="rh teal">⚡ Inicio Rápido (${jugN('rapido')})</div><ul>${list('rapido')}</ul></div>`
    + `<div class="rostercol"><div class="rh green">🛡️ Control Sostenido (${jugN('control')})</div><ul>${list('control')}</ul></div>`;
}

const ATRAS = {cortinilla:"lobby",pregunta:"cortinilla",opciones:"pregunta",responder:"opciones",
  bloqueo:"responder",resultado:"bloqueo","var":"resultado",cierre:"resultado",final:"resultado",despedida:"final"};
function atras(){
  if(enPenales()){
    const pmap={opciones:"pregunta",responder:"opciones",bloqueo:"responder",resultado:"bloqueo",penintro:"var"};
    if(EV.estado==="pregunta"){ db.ref("evento").update((EV.penal||1)<=1?{estado:"penintro"}:{estado:"resultado",penal:(EV.penal-1)}); return; }
    if(pmap[EV.estado]) setEstado(pmap[EV.estado]);
    return;
  }
  const p=ATRAS[EV.estado]; if(p) setEstado(p);
}

function reiniciar(){
  if(!confirm("¿Reiniciar el evento? Se borran respuestas, puntajes y jugadores.")) return;
  db.ref().update({ evento:{estado:"lobby",caso_actual:1}, respuestas:null, scored:null,
    equipos:{rapido:{puntaje:0,racha:0},control:{puntaje:0,racha:0}}, var_solicitudes:null,
    jugadores:null, reacciones:null });
}

function exportar(){
  Promise.all([db.ref("respuestas").once("value"),db.ref("equipos").once("value"),db.ref("jugadores").once("value")])
  .then(([rs,es,js])=>{
    const resp=rs.val()||{}, jug=js.val()||{};
    const porCaso = CASOS.map(c=>{
      const r = resp[c.id]||{}; const arr=Object.values(r);
      const tot=arr.length, ok=arr.filter(x=>x.correcta).length;
      return { caso:c.id, pregunta:c.pregunta, correcta:c.correcta,
        respuestas:tot, aciertos:ok, pct_acierto: tot?Math.round(100*ok/tot):0,
        distribucion:["A","B","C","D"].reduce((o,k)=>(o[k]=arr.filter(x=>x.opcion===k).length,o),{}) };
    });
    const data={ generado:new Date().toISOString(), jugadores:Object.keys(jug).length,
      equipos:es.val()||{}, por_caso:porCaso };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="analitica-partido-evidencia.json"; a.click();
  });
}

function render(){
  document.getElementById("ponenteTag").textContent = EV.ponente
    ? ("🎤 Ponente: " + (EV.ponente==="villar"?"Dra. Villar":"Dr. Cerda"))
    : "🎤 Ponente: sin seleccionar (elígelo antes de iniciar)";
  document.getElementById("stName").textContent = ST_NOMBRE[EV.estado]||EV.estado;
  document.getElementById("stCaso").textContent =
    (EV.estado==="lobby"||EV.estado==="final") ? ""
    : enPenales() ? ("Penal "+(EV.penal||1)+" de "+PENALES.length)
    : ("Caso "+(EV.caso_actual||1)+" de "+CASOS.length);
  document.getElementById("nConn").textContent = Object.values(JUG).filter(j=>j.conectado!==false).length;
  document.getElementById("nRap").textContent = jugN("rapido");
  document.getElementById("nCon").textContent = jugN("control");

  const vi=document.getElementById("varInfo");
  const nv=Object.keys(VARS).length;
  vi.innerHTML = (EV.estado==="resultado" && nv) ? `<div class="varbox pulse">🚨 VAR solicitado por ${nv} médico(s)</div>` : "";

  const a=document.getElementById("actions"); a.innerHTML="";
  function add(label, fn, cls){ const b=document.createElement("button");
    b.className="btn lg wide"+(cls?(" "+cls):""); b.textContent=label; b.onclick=fn; a.appendChild(b); }
  function addP(label, fn, cls){ add(label, fn, "primary"+(cls?(" "+cls):"")); }
  function sep(){ const d=document.createElement("div"); d.className="sep"; a.appendChild(d); }

  // 1) BOTÓN PRINCIPAL (siempre primero, el más vistoso)
  switch(EV.estado){
    case "lobby":      addP("▶️ Iniciar partido", ()=>setEstado("cortinilla")); break;
    case "cortinilla": addP("Mostrar pregunta →", ()=>setEstado("pregunta")); break;
    case "pregunta":   addP("Mostrar opciones →", ()=>setEstado("opciones")); break;
    case "opciones":   addP("⏱ Iniciar cronómetro", abrirRespuestas); break;
    case "responder":  addP("Cerrar tiempo (silbato)", cerrarTiempo); break;
    case "bloqueo":    addP("Revelar resultado ⚽", revelar); break;
    case "resultado":
      if(enPenales()) addP((EV.penal||1)>=PENALES.length ? "🏆 Ver ganador →" : "Siguiente penal →", siguiente);
      else addP("🟥 Ir al VAR", ()=>setEstado("var"));
      break;
    case "var":        addP(esUltimo()?"🥅 Ir a penales →":"Siguiente pregunta →", siguiente); break;
    case "penintro":   addP("Iniciar penal "+(EV.penal||1)+" →", ()=>db.ref("evento").update({estado:"pregunta", empate:false})); break;
    case "final":      addP("👋 Reproducir despedida →", ()=>setEstado("despedida")); break;
    case "despedida":  addP("🔄 Nuevo partido (reiniciar)", reiniciar, "danger"); break;
  }
  // Atrás (deshacer) justo bajo el principal
  if(ATRAS[EV.estado]){ add("↩️ Atrás (undo)", atras, "ghost mini"); }

  sep();
  // 2) Selección / presentación del ponente (solo en lobby)
  if(EV.estado==="lobby"){
    if(!EV.ponente){
      add("👤 Elegir ponente: Dra. Villar", ()=>db.ref("evento/ponente").set("villar"), "ghost");
      add("👤 Elegir ponente: Dr. Cerda", ()=>db.ref("evento/ponente").set("cerda"), "ghost");
    } else {
      const nom = EV.ponente==="villar" ? "Dra. Villar" : "Dr. Cerda";
      add(EV.presentacion ? "⏹️ Detener presentación" : ("🎤 Reproducir presentación · "+nom),
          lanzarPresentacion, "ghost mini");
    }
  }
  // 3) Lanzadores secundarios (siempre disponibles, en chico)
  add(EV.mostrar_qr?"🙈 Ocultar QR":"📲 Mostrar QR de acceso",
      ()=>db.ref("evento/mostrar_qr").set(!EV.mostrar_qr), "ghost mini");
  add(EV.musica?"⏹️ Detener video musical":"🎵 Lanzar video musical",
      ()=>lanzarOverlay("musica"), "ghost mini");
  add(EV.loop_full?"⏹️ Detener loop":"🎬 Lanzar loop (sin sonido)",
      ()=>lanzarOverlay("loop_full"), "ghost mini");
  add(EV.empate?"⏹️ Detener 'Vamos a penales'":"🥅 Vamos a penales (video)",
      ()=>lanzarOverlay("empate"), "ghost mini");
  const cm = casoMod();
  if(!enPenales() && cm && ((cm.contexto_media&&cm.contexto_media.length) || cm.imagen || (cm.caso||"").trim())){
    add(EV.mostrar_contexto?"🙈 Ocultar contexto":"👁 Ver contexto", toggleContexto, "ghost mini");
    const nSlides=(cm.contexto_media||[]).length;
    if(EV.mostrar_contexto && nSlides>1){
      const cur=(EV.ctx_slide||0);
      add("🖼️ Contexto "+(cur+1)+"/"+nSlides+" — siguiente slide →", ()=>db.ref("evento/ctx_slide").set((cur+1)%nSlides), "ghost mini");
    }
  }
  // 4) Cambiar ponente: hasta abajo (solo en lobby con ponente)
  if(EV.estado==="lobby" && EV.ponente){
    sep();
    add("🔁 Cambiar ponente", ()=>{ db.ref("evento/presentacion").set(null); db.ref("evento/ponente").set(null); }, "ghost mini");
  }
}

fbOnReady(()=>{
  ready=true; document.getElementById("conn").textContent="🟢 en línea"; document.getElementById("cfgnote").textContent="";
  watchServerOffset(db);
  db.ref("evento").once("value").then(s=>{ if(!s.exists()) db.ref("evento").set({estado:"lobby",caso_actual:1}); });
  db.ref("evento").on("value", s=>{ EV=s.val()||{estado:"lobby",caso_actual:1}; render(); });
  db.ref("jugadores").on("value", s=>{ JUG=s.val()||{}; render(); renderRoster(); });
  db.ref("var_solicitudes").on("value", s=>{ VARS=s.val()||{}; render(); });
});
render();
</script>
</body></html>
