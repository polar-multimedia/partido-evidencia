<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Control · El Partido de la Evidencia</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  html{background:#0a0e15}
  body{background:transparent}
  #bgloop{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;opacity:.22}
  #bgveil{position:fixed;inset:0;z-index:-1;background:
    radial-gradient(130% 80% at 0% 0%, rgba(25,195,214,.20), transparent 46%),
    radial-gradient(130% 80% at 100% 100%, rgba(255,140,90,.18), transparent 46%),
    linear-gradient(rgba(8,11,17,.82),rgba(8,11,17,.93))}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;

  .card{background:rgba(20,28,42,.80);border:1px solid rgba(255,255,255,.07);border-radius:18px;

  #ponenteTag{display:flex;align-items:center;gap:12px;background:rgba(25,195,214,.12);

  #dock{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:520px;margin:0 auto;

  #prim .navrow{display:flex;gap:10px;align-items:center}
  #prim .navrow .btn{flex:1;font-size:15px;padding:13px 10px;border-radius:14px;color:#fff;
    background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14)}
  #prim .navlbl{flex:0 0 auto;font-weight:900;color:#cfd8e3;font-size:14px;padding:0 6px}
  /* Duración con chips rápidos */
  .cfg{padding:12px 14px;display:flex;flex-direction:column;gap:10px;font-size:13px;color:var(--muted)}
  .cfg .chips{display:flex;gap:8px}

  .varbox{background:rgba(232,85,77,.12);border:1px solid rgba(232,85,77,.5);border-radius:14px;padding:12px;text-align:center;font-weight:800;color:#ffb4ae}

<video id="bgloop" src="../assets/loop.mp4" autoplay loop muted playsinline></video>
<div id="bgveil"></div>
<div id="app">
  <div class="hdr">

  <div class="stats">
    <div class="stat card"><div class="n" id="nConn">0</div><div class="l">Conectados</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="../assets/firebase.js"></script>
<script src="../assets/common.js"></script>
<script src="../assets/cases.js?v=22"></script>
<script>
const ST_NOMBRE = {lobby:"Lobby / Registro",cortinilla:"Cortinilla",pregunta:"Pregunta (sin opciones)",
  opciones:"Opciones (lee el ponente)",responder:"Respondiendo ⏱",bloqueo:"Bloqueo",
  resultado:"Resultado / Gol",var:"VAR de la evidencia",cierre:"Cierre",final:"Final / Campeón",despedida:"Despedida",penintro:"Vamos a penales",
  finpartido:"🏁 Fin del partido",marcadorfinal:"Marcador final",
  presentacion:"Presentación del ponente",contexto:"Contexto del caso",transicion:"Medio tiempo"};
let EV={estado:"lobby",caso_actual:1}, JUG={}, VARS={}, ready=false;

function esUltimo(){ return (EV.caso_actual||1) >= CASOS.length; }
function jugN(eq){ return Object.values(JUG).filter(j=>j.equipo===eq).length; }
function enPenales(){ return EV.modo==="penales"; }
function casoMod(){ return CASOS.find(x=>x.id===(EV.caso_actual||1)) || CASOS[0]; }
function casoClinico(){ return casoMod().caso_clinico || 1; }
function finCaso1(){ return (EV.caso_actual||1)===4; }   // última pregunta del caso clínico 1
function ultimaPreg(){ return esUltimaPregunta(EV.caso_actual||1, EV.ponente); }  // última pregunta de la secuencia del ponente
function preg(){ return enPenales() ? (PENALES[(EV.penal||1)-1]) : casoMod(); }
function qKey(){ return enPenales() ? ("P"+(EV.penal||1)) : (EV.caso_actual||1); }
function setEstado(e, extra){ if(ready) db.ref("evento").update(Object.assign({estado:e, mostrar_contexto:false, mostrar_qr:false, qr_rapido:false, qr_control:false, mostrar_equipos:false, presentacion:null}, extra||{})); }
function toggleContexto(){ if(ready) db.ref("evento").update({ mostrar_contexto:!EV.mostrar_contexto, ctx_slide:0 }); }
function lanzarOverlay(which){ // loop_full | musica | empate (mutuamente excluyentes)
  if(!ready) return;
  const estaba = which==="loop_full"?EV.loop_full : which==="musica"?EV.musica : EV.empate;
  const upd = { loop_full:false, musica:false, empate:false, presentacion:null };
  if(!estaba) upd[which]=true;
  db.ref("evento").update(upd);
}
function lanzarPresentacion(){ if(!ready) return;
  db.ref("evento").update({ presentacion: EV.presentacion?null:EV.ponente, loop_full:false, musica:false, empate:false });
}

function abrirRespuestas(){
  const dur = Math.max(5, parseInt(document.getElementById("dur").value)||25);
  db.ref("var_solicitudes").remove();
  setEstado("responder", { cronometro:{ inicio:serverNow(), duracion:dur, corriendo:true } });
}
function cerrarTiempo(){
  const c = EV.cronometro||{}; c.corriendo=false;
  setEstado("bloqueo", { cronometro:c });
}
function irAPenales(){ // forzar empate -> video "vamos a penales" -> penales
  db.ref("evento").update({ modo:"penales", penal:1, estado:"penintro", empate:true, gol_ronda:null, loop_full:false, musica:false });
}
function terminarPartido(){ // cerrar el juego: FIN DEL PARTIDO -> (auto) ganador -> despedida -> marcador final
  if(!confirm("¿Seguro que quieres TERMINAR el partido?\n\nSe cierra el juego con el marcador actual: pitazo final, equipo ganador, despedida y marcador con ambos logos.")) return;
  setEstado("finpartido");
  setTimeout(()=>{ if(EV.estado==="finpartido") setEstado("final"); }, 3300);
}
function siguiente(){ // tras el VAR de cada pregunta
  db.ref("var_solicitudes").remove();
  if(enPenales()){
    if((EV.penal||1) >= PENALES.length){ setEstado("final"); return; }
    db.ref("evento").update({ estado:"pregunta", penal:(EV.penal||1)+1, empate:false, gol_ronda:null });
    return;
  }
  if(ultimaPreg()){ irAPenales(); return; }                 // tras la última pregunta -> penales
  if(finCaso1()){ setEstado("transicion",{trans:"inicio2T"}); return; }  // tras P4 -> medio tiempo (final-primer-tiempo DESACTIVADO; va directo a inicio-segundo-tiempo. Para reactivar: trans:"final1T")
  const sig = siguientePreguntaId(EV.caso_actual||1, EV.ponente);        // siguiente pregunta de la secuencia (Villar salta la P7)
  setEstado("cortinilla",{ caso_actual: sig!=null ? sig : (EV.caso_actual||1)+1 });
}

/* --- Cálculo de puntaje (idempotente). Casos y penales. --- */
function revelar(){
  const key = qKey(); const c = pregEfectiva(preg(), EV.ponente); const pen = enPenales();
  db.ref("scored/"+key).once("value").then(sn=>{
    if(sn.val()){ setEstado("resultado"); return; }
    Promise.all([ db.ref("respuestas/"+key).once("value"), db.ref("equipos").once("value") ])
    .then(([rs,es])=>{
      const resp = rs.val()||{};
      const eq = es.val()||{};
      eq.rapido = eq.rapido||{puntaje:0,racha:0}; eq.control = eq.control||{puntaje:0,racha:0};
      const dur=(EV.cronometro&&EV.cronometro.duracion)||25;
      const inicio=(EV.cronometro&&EV.cronometro.inicio)||0;
      const add={rapido:0,control:0}, correctos={rapido:0,control:0};
      const st={rapido:{n:0,ok:0,vel:0},control:{n:0,ok:0,vel:0}};
      const updates={};
      Object.entries(resp).forEach(([uid,r])=>{
        const ok = esCorrecta(c, r.opcion);
        const tRest = Math.max(0, dur-((r.ts-inicio)/1000));
        const racha = (eq[r.equipo]||{}).racha||0;
        const pts = calcPuntos(ok, tRest, dur, racha);
        updates[`respuestas/${key}/${uid}/correcta`]=ok;
        updates[`respuestas/${key}/${uid}/puntos`]=pts;
        if(add[r.equipo]!==undefined){
          if(ok){ add[r.equipo]+=pts; correctos[r.equipo]++; }
          st[r.equipo].n++; if(ok) st[r.equipo].ok++; st[r.equipo].vel += dur? Math.max(0,tRest)/dur : 0;
        }
      });
      ["rapido","control"].forEach(t=>{
        eq[t].puntaje=(eq[t].puntaje||0)+add[t];
        eq[t].racha = correctos[t]>0 ? ((eq[t].racha||0)+1) : 0;
      });
      // Gol por DESEMPEÑO (puntos por jugador), no por cantidad de integrantes -> equipos disparejos compiten parejo
      const nR = Math.max(1, jugN("rapido")), nC = Math.max(1, jugN("control"));
      const normR = add.rapido / nR, normC = add.control / nC;
      const gol = normR>normC ? "rapido" : (normC>normR ? "control" : "empate");
      if(pen){
        if(gol==="rapido"||gol==="control"){ eq[gol].penales = (eq[gol].penales||0)+1; }
        const ps={};
        ["rapido","control"].forEach(t=>{ ps[t]={ aciertos: st[t].n?Math.round(100*st[t].ok/st[t].n):0, velocidad: st[t].n?Math.round(100*st[t].vel/st[t].n):0, n:st[t].n }; });
        updates["evento/penal_stats"]=ps;
      } else {
        if(gol==="rapido"||gol==="control"){ eq[gol].goles = (eq[gol].goles||0)+1; }
      }
      updates["equipos"]=eq; updates["scored/"+key]=true; updates["evento/gol_ronda"]=gol;
      db.ref().update(updates).then(()=>setEstado("resultado"));
    });
  });
}

let rosterOpen = false, overlaysOpen = false;
function toggleRoster(){ rosterOpen = !rosterOpen; renderRoster(); }
function buildDurChips(){
  const wrap=document.getElementById("durchips"); const inp=document.getElementById("dur");
  if(!wrap||!inp) return; wrap.innerHTML="";
  [10,15,20,30].forEach(v=>{ const c=document.createElement("div");
    c.className="chip"+(parseInt(inp.value)===v?" active":""); c.textContent=v+"s";
    c.onclick=()=>{ inp.value=v; buildDurChips(); }; wrap.appendChild(c); });
}
function renderRoster(){
  const el = document.getElementById("roster"); if(!el) return;
  const btn = document.getElementById("rosterBtn");
  if(btn) btn.textContent = rosterOpen ? "👥 Ocultar integrantes" : "👥 Ver integrantes de los equipos";
  if(!rosterOpen){ el.innerHTML = ""; return; }
  const list = eq => Object.values(JUG).filter(j=>j.equipo===eq)
    .map(j=>`<li>${escapeHTML(j.nombre||"—")}${j.conectado===false?' <span class="muted">(offline)</span>':''}</li>`).join("")
    || '<li class="muted">Sin jugadores</li>';
  el.innerHTML = `<div class="rostercol"><div class="rh teal">⚡ Inicio Rápido (${jugN('rapido')})</div><ul>${list('rapido')}</ul></div>`
    + `<div class="rostercol"><div class="rh green">🛡️ Control Sostenido (${jugN('control')})</div><ul>${list('control')}</ul></div>`;
}

const ATRAS = {presentacion:"lobby",contexto:"presentacion",cortinilla:"contexto",pregunta:"cortinilla",opciones:"pregunta",responder:"opciones",
  bloqueo:"responder",resultado:"bloqueo","var":"resultado",transicion:"var",final:"resultado",despedida:"final"};
function atras(){
  if(enPenales()){
    const pmap={opciones:"pregunta",responder:"opciones",bloqueo:"responder",resultado:"bloqueo",penintro:"var"};
    if(EV.estado==="pregunta"){ db.ref("evento").update((EV.penal||1)<=1?{estado:"penintro"}:{estado:"resultado",penal:(EV.penal-1)}); return; }
    if(pmap[EV.estado]) setEstado(pmap[EV.estado]);
    return;
  }
  const p=ATRAS[EV.estado]; if(p) setEstado(p);
}

function reiniciar(){
  if(!confirm("¿Reiniciar el evento? Se borran respuestas, puntajes y jugadores.")) return;
  db.ref().update({ evento:{estado:"lobby",caso_actual:1}, respuestas:null, scored:null,
    equipos:{rapido:{puntaje:0,racha:0},control:{puntaje:0,racha:0}}, var_solicitudes:null,
    jugadores:null, reacciones:null });
}

/* Export CSV nominal: una fila por participante con su respuesta en cada pregunta + aciertos y puntos */
function exportarCSV(){
  Promise.all([db.ref("respuestas").once("value"), db.ref("jugadores").once("value")])
  .then(([rs,js])=>{
    const resp = rs.val()||{}, jug = js.val()||{};
    // claves de preguntas: 1..N (casos) y P1..P5 (penales)
    const qKeys = CASOS.map(c=>String(c.id)).concat(PENALES.map(p=>"P"+p.n));
    const correctaDe = key => {
      if(String(key).startsWith("P")){ const p=PENALES[parseInt(key.slice(1))-1]; return p?p.correcta:""; }
      const c=CASOS.find(x=>String(x.id)===String(key)); return c?correctasTexto(c):"";
    };
    const esc = s => '"'+String(s==null?"":s).replace(/"/g,'""')+'"';
    const headerQ = CASOS.map(c=>"Caso"+c.caso_clinico+"-P"+c.id).concat(PENALES.map(p=>"Penal"+p.n));
    const head = ["Nombre","Equipo"].concat(headerQ).concat(["Aciertos","Puntos totales"]);
    const filaCorrecta = ["RESPUESTA CORRECTA",""].concat(qKeys.map(correctaDe)).concat(["",""]);
    const rows = [head, filaCorrecta];
    Object.entries(jug).forEach(([uid,j])=>{
      let aciertos=0, puntos=0;
      const cells = qKeys.map(k=>{
        const r = (resp[k]||{})[uid];
        if(!r) return "";
        if(r.correcta) aciertos++;
        puntos += (r.puntos||0);
        return r.opcion + (r.correcta?" ✓":" ✗");
      });
      const eqNom = j.equipo==="rapido" ? "Inicio Rápido" : (j.equipo==="control" ? "Control Sostenido" : (j.equipo||""));
      rows.push([j.nombre||"", eqNom].concat(cells).concat([aciertos, puntos]));
    });
    const csv = "﻿" + rows.map(r=>r.map(esc).join(",")).join("\r\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="participantes-partido-evidencia.csv"; a.click();
  });
}

function exportar(){
  Promise.all([db.ref("respuestas").once("value"),db.ref("equipos").once("value"),db.ref("jugadores").once("value")])
  .then(([rs,es,js])=>{
    const resp=rs.val()||{}, jug=js.val()||{};
    const porCaso = CASOS.map(c=>{
      const r = resp[c.id]||{}; const arr=Object.values(r);
      const tot=arr.length, ok=arr.filter(x=>x.correcta).length;
      return { caso:c.id, pregunta:c.pregunta, correcta:c.correcta,
        respuestas:tot, aciertos:ok, pct_acierto: tot?Math.round(100*ok/tot):0,
        distribucion:["A","B","C","D"].reduce((o,k)=>(o[k]=arr.filter(x=>x.opcion===k).length,o),{}) };
    });
    const data={ generado:new Date().toISOString(), jugadores:Object.keys(jug).length,
      equipos:es.val()||{}, por_caso:porCaso };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="analitica-partido-evidencia.json"; a.click();
  });
}

function render(){
  const pt=document.getElementById("ponenteTag");
  if(EV.ponente){
    pt.innerHTML = `<img src="../assets/arbitro-${EV.ponente}.png" alt=""><span>🏁 Árbitro Oficial del Encuentro<br><b>${EV.ponente==="villar"?"Dra. Alicia Villar":"Dr. Eduardo Cerda"}</b></span>`;
  } else {
    pt.innerHTML = `<span>🎤 Árbitro sin seleccionar — elígelo antes de iniciar</span>`;
  }
  document.getElementById("stName").textContent = ST_NOMBRE[EV.estado]||EV.estado;
  document.getElementById("stCaso").textContent =
    (EV.estado==="lobby"||EV.estado==="final"||EV.estado==="presentacion") ? ""
    : enPenales() ? ("Penal "+(EV.penal||1)+" de "+PENALES.length)
    : ("Caso clínico "+casoClinico()+" · Pregunta "+numPregunta(EV.caso_actual||1, EV.ponente)+" de "+totalPreguntas(EV.ponente));
  document.getElementById("nConn").textContent = Object.values(JUG).filter(j=>j.conectado!==false).length;
  document.getElementById("nRap").textContent = jugN("rapido");
  document.getElementById("nCon").textContent = jugN("control");

  const vi=document.getElementById("varInfo");
  const nv=Object.keys(VARS).length;
  vi.innerHTML = (EV.estado==="resultado" && nv) ? `<div class="varbox pulse">🚨 VAR solicitado por ${nv} médico(s)</div>` : "";

  const a=document.getElementById("actions"); a.innerHTML="";
  const prim=document.getElementById("prim"); prim.innerHTML="";
  function add(label, fn, cls){ const b=document.createElement("button");
    b.className="btn "+(cls||"ghost mini"); b.textContent=label; b.onclick=fn; a.appendChild(b); return b; }
  function addP(label, fn, cls){ const b=document.createElement("button");
    b.className="btn primary"+(cls?(" "+cls):"");
    const eb=document.createElement("span"); eb.className="pstep"; eb.textContent="SIGUIENTE PASO";
    const ds=document.createElement("span"); ds.className="pdesc"; ds.textContent=label;
    b.appendChild(eb); b.appendChild(ds);
    b.onclick=fn; prim.appendChild(b); return b; }

  // ===== BOTÓN PRINCIPAL (dock fijo abajo) ===== (.go = verde "avanzar")
  switch(EV.estado){
    case "lobby":      addP("▶️ Iniciar", ()=>{ if(!EV.ponente && !confirm("No has elegido árbitro. ¿Iniciar de todos modos?")) return; setEstado("presentacion",{caso_actual:1, modo:null, penal:null}); }, "go"); break;
    case "presentacion": addP("Contexto Caso 1 →", ()=>setEstado("contexto",{ctx_slide:0}), "go"); break;
    case "contexto":   addP("Mostrar cortinilla pregunta "+numPregunta(EV.caso_actual||1, EV.ponente)+" →", ()=>setEstado("cortinilla"), "go"); break;
    case "cortinilla": addP("Mostrar pregunta "+numPregunta(EV.caso_actual||1, EV.ponente)+" →", ()=>setEstado("pregunta"), "go"); break;
    case "pregunta":   addP("Mostrar opciones →", ()=>setEstado("opciones"), "go"); break;
    case "opciones":   addP("⏱ Iniciar cronómetro", abrirRespuestas); break;
    case "responder":  addP("Cerrar tiempo (silbato)", cerrarTiempo); break;
    case "bloqueo":    addP("Revelar resultado ⚽", revelar, "go"); break;
    case "resultado":
      if(enPenales()) addP((EV.penal||1)>=PENALES.length ? "🏆 Ver ganador →" : "Siguiente penal →", siguiente, "go");
      else addP("🟥 Ver VAR pregunta "+(EV.caso_actual||1), ()=>setEstado("var",{var_slide:0}));
      break;
    case "var":
      if(ultimaPreg()) addP("🥅 Ir a penales →", siguiente);
      else if(finCaso1()) addP("▶️ Inicio segundo tiempo →", siguiente, "go");
      else addP("Mostrar cortinilla pregunta "+numPregunta(siguientePreguntaId(EV.caso_actual||1, EV.ponente)||((EV.caso_actual||1)+1), EV.ponente)+" →", siguiente, "go");
      break;
    case "transicion":
      if(EV.trans==="final1T") addP("▶️ Inicio segundo tiempo →", ()=>setEstado("transicion",{trans:"inicio2T"}), "go");
      else addP("Contexto Caso 2 →", ()=>setEstado("contexto",{caso_actual:5, ctx_slide:0}), "go");
      break;
    case "penintro":   addP("Iniciar penal "+(EV.penal||1)+" →", ()=>db.ref("evento").update({estado:"pregunta", empate:false}), "go"); break;
    case "finpartido": addP("🏆 Ver equipo ganador →", ()=>setEstado("final"), "go"); break;
    case "final":      addP("👋 Reproducir despedida →", ()=>setEstado("despedida"), "go"); break;
    case "despedida":  addP("🏁 Marcador final →", ()=>setEstado("marcadorfinal"), "go"); break;
    case "marcadorfinal": addP("🔄 Nuevo partido (reiniciar)", reiniciar, "danger"); break;
  }
  // Carrusel (◀ anterior / siguiente ▶) JUSTO debajo del botón principal, dentro del dock
  if(EV.estado==="contexto" || EV.mostrar_contexto){ const n=contextoPonente(casoClinico(), EV.ponente).length; if(n>1) navSlides("ctx_slide", n); }
  if(EV.estado==="var"){ const vm=varMediaPonente(preg(), EV.ponente); if(vm.length>1) navSlides("var_slide", vm.length); }

  // ===== CONTROLES SECUNDARIOS (cuerpo, con scroll) =====
  // Selección de árbitro (solo en lobby sin árbitro)
  if(EV.estado==="lobby" && !EV.ponente){
    add("👤 Elegir árbitro: Dra. Villar", ()=>db.ref("evento/ponente").set("villar"), "ghost");
    add("👤 Elegir árbitro: Dr. Cerda", ()=>db.ref("evento/ponente").set("cerda"), "ghost");
  }
  // Ver contexto a demanda durante las preguntas
  const ncx = contextoPonente(casoClinico(), EV.ponente).length;
  if(!enPenales() && ncx && ["cortinilla","pregunta","opciones","responder","bloqueo","resultado","var"].includes(EV.estado)){
    add(EV.mostrar_contexto?"🙈 Ocultar contexto":"👁 Ver contexto", toggleContexto, "ghost mini");
  }
  // Atrás (deshacer) durante el flujo
  if(ATRAS[EV.estado] || (enPenales() && ["pregunta","opciones","responder","bloqueo","resultado"].includes(EV.estado))){
    add("↩️ Atrás (undo)", atras, "ghost mini");
  }
  // Cambiar árbitro (lobby con árbitro)
  if(EV.estado==="lobby" && EV.ponente){
    add("🔁 Cambiar árbitro", ()=>{ db.ref("evento/presentacion").set(null); db.ref("evento/ponente").set(null); }, "ghost mini");
  }
  // TERMINAR PARTIDO — visible durante el juego (cierra con el marcador actual)
  if(!["lobby","presentacion","finpartido","final","despedida","marcadorfinal"].includes(EV.estado)){
    add("🏁 Terminar partido", terminarPartido, "term");
  }
  // Overlays en pantalla (agrupados/plegables)
  const det=document.createElement("details"); det.className="card"; det.open=overlaysOpen;
  det.addEventListener("toggle",()=>{ overlaysOpen=det.open; });
  const sum=document.createElement("summary"); sum.textContent="🎬 Overlays en pantalla"; det.appendChild(sum);
  const box=document.createElement("div"); box.className="actions"; box.style.marginTop="10px"; det.appendChild(box);
  const ov=(label,fn,cls)=>{ const b=document.createElement("button"); b.className="btn ghost mini"+(cls?" "+cls:""); b.textContent=label; b.onclick=fn; box.appendChild(b); };
  ov(EV.mostrar_qr?"🙈 Ocultar QR general":"📲 QR de acceso (general)", ()=>db.ref("evento").update({mostrar_qr:!EV.mostrar_qr, qr_rapido:false, qr_control:false}));
  ov(EV.qr_rapido?"🙈 Ocultar QR ⚡ Inicio Rápido":"⚡ Mostrar QR Inicio Rápido", ()=>db.ref("evento").update({qr_rapido:!EV.qr_rapido, mostrar_qr:false}));
  ov(EV.qr_control?"🙈 Ocultar QR 🛡️ Control Sostenido":"🛡️ Mostrar QR Control Sostenido", ()=>db.ref("evento").update({qr_control:!EV.qr_control, mostrar_qr:false}));
  ov(EV.mostrar_equipos?"🙈 Ocultar integrantes en pantalla":"👥 Mostrar integrantes en pantalla", ()=>db.ref("evento/mostrar_equipos").set(!EV.mostrar_equipos));
  ov(EV.musica?"⏹️ Detener video musical":"🎵 Lanzar video musical", ()=>lanzarOverlay("musica"));
  ov(EV.loop_full?"⏹️ Detener loop":"🎬 Lanzar loop (sin sonido)", ()=>lanzarOverlay("loop_full"));
  a.appendChild(det);

  function navSlides(field, n){   // ◀ Anterior / x/N / Siguiente ▶ — dentro del dock, bajo el principal
    const cur = EV[field]||0;
    const row = document.createElement("div"); row.className="navrow"; prim.appendChild(row);
    const mk=(label,to)=>{ const x=document.createElement("button"); x.className="btn"; x.textContent=label;
      x.onclick=()=>db.ref("evento/"+field).set(((to)%n+n)%n); row.appendChild(x); };
    mk("◀ Anterior", cur-1);
    const lbl=document.createElement("div"); lbl.className="navlbl"; lbl.textContent=(cur+1)+"/"+n; row.appendChild(lbl);
    mk("Siguiente ▶", cur+1);
  }
}

fbOnReady(()=>{
  ready=true; document.getElementById("conn").textContent="🟢 en línea"; document.getElementById("cfgnote").textContent="";
  watchServerOffset(db);
  db.ref("evento").once("value").then(s=>{ if(!s.exists()) db.ref("evento").set({estado:"lobby",caso_actual:1}); });
  db.ref("evento").on("value", s=>{ EV=s.val()||{estado:"lobby",caso_actual:1}; render(); });
  db.ref("jugadores").on("value", s=>{ JUG=s.val()||{}; render(); renderRoster(); });
  db.ref("var_solicitudes").on("value", s=>{ VARS=s.val()||{}; render(); });
});
// Feedback táctil al pulsar cualquier botón
document.addEventListener("pointerdown", e=>{
  if(e.target.closest && e.target.closest(".btn") && navigator.vibrate){ try{ navigator.vibrate(12); }catch(_){} }
});
// Chips de duración
buildDurChips();
document.getElementById("dur").addEventListener("input", buildDurChips);
render();
</script>
</body></html>
