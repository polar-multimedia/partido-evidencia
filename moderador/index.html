<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Control · El Partido de la Evidencia</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:16px;gap:12px}
  .hdr{display:flex;align-items:center;justify-content:space-between}
  .hdr .brand{font-size:15px}
  .statebox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
  .statebox .tag{margin-bottom:4px}
  .statebox .st{font-size:26px;font-weight:900}
  .statebox .caso{color:var(--muted);font-size:14px;margin-top:2px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
  .stat .n{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .row{display:flex;gap:10px}
  .row .btn{flex:1}
  .mini{font-size:14px;padding:11px 14px;border-radius:11px}
  .cfg{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;font-size:14px}
  .cfg input{width:66px;padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-family:inherit}
  .varbox{background:rgba(232,85,77,.12);border:1px solid rgba(232,85,77,.5);border-radius:12px;padding:12px;text-align:center;font-weight:800;color:#ffb4ae}
  .danger{color:var(--red);border-color:rgba(232,85,77,.4) !important}
  details{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:13px}
  summary{cursor:pointer;color:var(--muted)}
  #cfgnote{text-align:center;color:var(--muted);font-size:11px}
  #roster{display:flex;gap:10px;margin-top:2px}
  #roster:empty{display:none}
  .rostercol{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .rostercol .rh{font-weight:800;font-size:13px;margin-bottom:6px}
  .rostercol ul{margin:0;padding-left:18px;font-size:13px}
  .rostercol li{margin-bottom:3px}
  .teal{color:var(--teal)} .green{color:var(--green)}
</style>
</head><body>
<div id="app">
  <div class="hdr">
    <div class="brand">🎛️ Control <span class="kc">· Partido de la Evidencia</span></div>
    <span class="tag" id="conn">···</span>
  </div>
  <div class="statebox">
    <div class="tag">Estado actual</div>
    <div class="st" id="stName">—</div>
    <div class="caso" id="stCaso"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" id="nConn">0</div><div class="l">Conectados</div></div>
    <div class="stat"><div class="n" id="nRap" style="color:var(--teal)">0</div><div class="l">⚡ Rápido</div></div>
    <div class="stat"><div class="n" id="nCon" style="color:var(--green)">0</div><div class="l">🛡️ Control</div></div>
  </div>
  <button class="btn ghost mini" id="rosterBtn" onclick="toggleRoster()">👥 Ver integrantes de los equipos</button>
  <div id="roster"></div>
  <div id="varInfo"></div>
  <div class="actions" id="actions"></div>
  <div class="cfg">⏱ Duración por pregunta
    <input id="dur" type="number" min="5" max="120" value="15"> seg</div>
  <details><summary>Herramientas</summary>
    <div class="actions" style="margin-top:10px">
      <button class="btn ghost mini" onclick="exportar()">⬇️ Exportar analítica (JSON)</button>
      <button class="btn ghost mini" onclick="atras()">↩️ Atrás (corregir estado)</button>
      <button class="btn ghost mini danger" onclick="reiniciar()">🗑️ Reiniciar evento</button>
    </div>
  </details>
  <div id="cfgnote"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="../assets/firebase.js"></script>
<script src="../assets/common.js"></script>
<script src="../assets/cases.js"></script>
<script>
const ST_NOMBRE = {lobby:"Lobby / Registro",cortinilla:"Cortinilla",pregunta:"Pregunta (sin opciones)",
  opciones:"Opciones (lee el ponente)",responder:"Respondiendo ⏱",bloqueo:"Bloqueo",
  resultado:"Resultado / Gol",var:"VAR de la evidencia",cierre:"Cierre",final:"Final"};
let EV={estado:"lobby",caso_actual:1}, JUG={}, VARS={}, ready=false;

function esUltimo(){ return (EV.caso_actual||1) >= CASOS.length; }
function jugN(eq){ return Object.values(JUG).filter(j=>j.equipo===eq).length; }
function setEstado(e, extra){ if(ready) db.ref("evento").update(Object.assign({estado:e}, extra||{})); }

function abrirRespuestas(){
  const dur = Math.max(5, parseInt(document.getElementById("dur").value)||25);
  db.ref("var_solicitudes").remove();
  setEstado("responder", { cronometro:{ inicio:serverNow(), duracion:dur, corriendo:true } });
}
function cerrarTiempo(){
  const c = EV.cronometro||{}; c.corriendo=false;
  setEstado("bloqueo", { cronometro:c });
}
function siguiente(){
  if(esUltimo()){ setEstado("final"); return; }
  db.ref("var_solicitudes").remove();
  db.ref("evento").update({ estado:"cortinilla", caso_actual:(EV.caso_actual||1)+1 });
}

/* --- Cálculo de puntaje (idempotente por caso) --- */
function revelar(){
  const cid = EV.caso_actual||1; const c = CASOS.find(x=>x.id===cid)||CASOS[0];
  db.ref("scored/"+cid).once("value").then(sn=>{
    if(sn.val()){ setEstado("resultado"); return; }
    Promise.all([ db.ref("respuestas/"+cid).once("value"), db.ref("equipos").once("value") ])
    .then(([rs,es])=>{
      const resp = rs.val()||{};
      const eq = es.val()||{};
      eq.rapido = eq.rapido||{puntaje:0,racha:0}; eq.control = eq.control||{puntaje:0,racha:0};
      const dur=(EV.cronometro&&EV.cronometro.duracion)||25;
      const inicio=(EV.cronometro&&EV.cronometro.inicio)||0;
      const add={rapido:0,control:0}, correctos={rapido:0,control:0}, updates={};
      Object.entries(resp).forEach(([uid,r])=>{
        const ok = esCorrecta(c, r.opcion);
        const tRest = Math.max(0, dur-((r.ts-inicio)/1000));
        const racha = (eq[r.equipo]||{}).racha||0;
        const pts = calcPuntos(ok, tRest, dur, racha);
        updates[`respuestas/${cid}/${uid}/correcta`]=ok;
        updates[`respuestas/${cid}/${uid}/puntos`]=pts;
        if(ok && add[r.equipo]!==undefined){ add[r.equipo]+=pts; correctos[r.equipo]++; }
      });
      ["rapido","control"].forEach(t=>{
        eq[t].puntaje=(eq[t].puntaje||0)+add[t];
        eq[t].racha = correctos[t]>0 ? ((eq[t].racha||0)+1) : 0;
      });
      const gol = add.rapido>add.control ? "rapido" : (add.control>add.rapido ? "control" : "empate");
      updates["equipos"]=eq; updates["scored/"+cid]=true; updates["evento/gol_ronda"]=gol;
      db.ref().update(updates).then(()=>setEstado("resultado"));
    });
  });
}

let rosterOpen = false;
function toggleRoster(){ rosterOpen = !rosterOpen; renderRoster(); }
function renderRoster(){
  const el = document.getElementById("roster"); if(!el) return;
  const btn = document.getElementById("rosterBtn");
  if(btn) btn.textContent = rosterOpen ? "👥 Ocultar integrantes" : "👥 Ver integrantes de los equipos";
  if(!rosterOpen){ el.innerHTML = ""; return; }
  const list = eq => Object.values(JUG).filter(j=>j.equipo===eq)
    .map(j=>`<li>${escapeHTML(j.nombre||"—")}${j.conectado===false?' <span class="muted">(offline)</span>':''}</li>`).join("")
    || '<li class="muted">Sin jugadores</li>';
  el.innerHTML = `<div class="rostercol"><div class="rh teal">⚡ Inicio Rápido (${jugN('rapido')})</div><ul>${list('rapido')}</ul></div>`
    + `<div class="rostercol"><div class="rh green">🛡️ Control Sostenido (${jugN('control')})</div><ul>${list('control')}</ul></div>`;
}

const ATRAS = {cortinilla:"lobby",pregunta:"cortinilla",opciones:"pregunta",responder:"opciones",
  bloqueo:"responder",resultado:"bloqueo","var":"resultado",cierre:"resultado",final:"resultado"};
function atras(){ const p=ATRAS[EV.estado]; if(p) setEstado(p); }

function reiniciar(){
  if(!confirm("¿Reiniciar el evento? Se borran respuestas, puntajes y jugadores.")) return;
  db.ref().update({ evento:{estado:"lobby",caso_actual:1}, respuestas:null, scored:null,
    equipos:{rapido:{puntaje:0,racha:0},control:{puntaje:0,racha:0}}, var_solicitudes:null,
    jugadores:null, reacciones:null });
}

function exportar(){
  Promise.all([db.ref("respuestas").once("value"),db.ref("equipos").once("value"),db.ref("jugadores").once("value")])
  .then(([rs,es,js])=>{
    const resp=rs.val()||{}, jug=js.val()||{};
    const porCaso = CASOS.map(c=>{
      const r = resp[c.id]||{}; const arr=Object.values(r);
      const tot=arr.length, ok=arr.filter(x=>x.correcta).length;
      return { caso:c.id, pregunta:c.pregunta, correcta:c.correcta,
        respuestas:tot, aciertos:ok, pct_acierto: tot?Math.round(100*ok/tot):0,
        distribucion:["A","B","C","D"].reduce((o,k)=>(o[k]=arr.filter(x=>x.opcion===k).length,o),{}) };
    });
    const data={ generado:new Date().toISOString(), jugadores:Object.keys(jug).length,
      equipos:es.val()||{}, por_caso:porCaso };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="analitica-partido-evidencia.json"; a.click();
  });
}

function render(){
  document.getElementById("stName").textContent = ST_NOMBRE[EV.estado]||EV.estado;
  document.getElementById("stCaso").textContent =
    (EV.estado==="lobby"||EV.estado==="final")?"":("Caso "+(EV.caso_actual||1)+" de "+CASOS.length);
  document.getElementById("nConn").textContent = Object.values(JUG).filter(j=>j.conectado!==false).length;
  document.getElementById("nRap").textContent = jugN("rapido");
  document.getElementById("nCon").textContent = jugN("control");

  const vi=document.getElementById("varInfo");
  const nv=Object.keys(VARS).length;
  vi.innerHTML = (EV.estado==="resultado" && nv) ? `<div class="varbox pulse">🚨 VAR solicitado por ${nv} médico(s)</div>` : "";

  const a=document.getElementById("actions"); a.innerHTML="";
  function add(label, fn, cls){ const b=document.createElement("button");
    b.className="btn lg wide"+(cls?(" "+cls):""); b.textContent=label; b.onclick=fn; a.appendChild(b); }
  switch(EV.estado){
    case "lobby":
      add("▶️ Iniciar partido", ()=>setEstado("cortinilla"));
      add(EV.mostrar_qr?"🙈 Ocultar QR en pantalla":"📲 Mostrar QR en pantalla",
          ()=>db.ref("evento/mostrar_qr").set(!EV.mostrar_qr), "ghost");
      break;
    case "cortinilla": add("Mostrar el caso →", ()=>setEstado("pregunta")); break;
    case "pregunta":   add("Mostrar opciones →", ()=>setEstado("opciones")); break;
    case "opciones":   add("Abrir respuestas ⏱", abrirRespuestas, "teal"); break;
    case "responder":  add("🔔 Cerrar tiempo (silbato)", cerrarTiempo); break;
    case "bloqueo":    add("Revelar resultado ⚽", revelar); break;
    case "resultado":
      add("🟥 Ir al VAR", ()=>setEstado("var"), "ghost");
      add(esUltimo()?"🏁 Finalizar partido":"Siguiente caso →", siguiente, "teal"); break;
    case "var":
      add(esUltimo()?"🏁 Finalizar partido":"Siguiente caso →", siguiente, "teal"); break;
    case "final":      add("🔄 Nuevo partido (reiniciar)", reiniciar, "ghost danger"); break;
  }
}

fbOnReady(()=>{
  ready=true; document.getElementById("conn").textContent="🟢 en línea"; document.getElementById("cfgnote").textContent="";
  watchServerOffset(db);
  db.ref("evento").once("value").then(s=>{ if(!s.exists()) db.ref("evento").set({estado:"lobby",caso_actual:1}); });
  db.ref("evento").on("value", s=>{ EV=s.val()||{estado:"lobby",caso_actual:1}; render(); });
  db.ref("jugadores").on("value", s=>{ JUG=s.val()||{}; render(); renderRoster(); });
  db.ref("var_solicitudes").on("value", s=>{ VARS=s.val()||{}; render(); });
});
render();
</script>
</body></html>
