<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>El Partido de la Evidencia · Médico</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  body{min-height:100vh;background:transparent;
    --green:#54C4B4; --green2:#3FA897; --red:#2A459B; --navy:#27398D}
  .btn{box-shadow:0 6px 22px rgba(84,196,180,.22)}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:linear-gradient(rgba(8,11,17,.40),rgba(8,11,17,.62) 50%,rgba(8,11,17,.88)), url(../assets/fondo_jugador.jpg) center center/cover no-repeat}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:18px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .topbar .me{font-weight:700;font-size:14px}
  .chip{font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px}
  .chip.rapido{background:rgba(25,195,214,.16);color:var(--teal)}
  .chip.control{background:rgba(140,224,33,.16);color:var(--green)}
  .body{flex:1;display:flex;flex-direction:column;justify-content:flex-start;gap:14px}
  h2{font-size:24px;margin:0}
  .field{width:100%;padding:15px;border-radius:13px;border:1px solid var(--line);background:var(--panel);
    color:var(--text);font-size:17px;font-family:inherit}
  .teamsel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .teamsel button{padding:22px 12px;border-radius:16px;border:2px solid var(--line);background:var(--panel);
    color:var(--text);font-family:inherit;font-weight:800;font-size:16px;cursor:pointer}
  .teamsel button .e{font-size:34px;display:block;margin-bottom:6px}
  .teamsel button[data-sel="1"]{border-color:var(--green);background:rgba(140,224,33,.10)}
  .watch{text-align:center;color:var(--muted);margin:auto 0}
  .watch .em{font-size:64px}
  #mtimer{font-size:64px;text-align:center}
  .reacth{text-align:center;color:#cdd8e4;font-size:14px;font-weight:700;margin:16px 0 6px}
  .react{display:flex;gap:12px;justify-content:center;margin-top:4px}
  .react button{background:var(--panel);border:1px solid var(--line);border-radius:16px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 14px;min-width:86px}
  .react .re{font-size:30px;line-height:1}
  .react .rl{font-size:12px;font-weight:800;color:#cdd8e4}
  .result-big{font-size:40px;text-align:center;font-weight:900}
  .learn li{margin-bottom:14px}
  .learn .ok{color:var(--green);font-weight:800}
  #cfgnote{position:fixed;bottom:8px;left:0;right:0;text-align:center;color:var(--muted);font-size:11px}
  .leave{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;
    font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;cursor:pointer;margin-left:8px}
  .leave:hover{color:var(--red);border-color:var(--red)}
  .step-lbl{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
  .teamsel button{display:flex;flex-direction:column;align-items:center;gap:2px}
  .teamsel button .tname{font-size:16px;font-weight:800;margin-top:4px}
  .shield-wrap{display:flex;justify-content:center}
  .shield-wrap img{width:78px;height:78px;object-fit:contain}
  .shield-emoji{display:none;width:78px;height:78px;place-items:center;font-size:46px}
  .mcase{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .mcase .lbl{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:800}
  .mcase .ct{font-size:15px;line-height:1.42;margin:6px 0 10px;color:#d4dfeb}
  .mcase .qq{font-size:18px;font-weight:800;line-height:1.3}
  .mcaseimg{width:100%;border-radius:10px;margin:8px 0 4px;display:block}
  /* ---- Registro estilo app deportiva ---- */
  .reg{display:flex;flex-direction:column;gap:14px}
  .hero{position:relative;border-radius:20px;overflow:hidden;padding:6px 4px 14px}
  .kclogo{height:104px;width:auto;max-width:100%;display:block;margin:6px 0 16px;filter:drop-shadow(0 3px 12px rgba(0,0,0,.55))}
  .rtitle{font-size:38px;line-height:.9;font-weight:900;letter-spacing:-.02em;margin:0;text-transform:uppercase}
  .pills2{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .pill2{font-size:12px;font-weight:800;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);color:#cdd8e4}
  .pill2.xp{color:var(--green);border-color:rgba(84,196,180,.45)}
  .tags2{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .tagpill{font-size:11px;font-weight:800;letter-spacing:.04em;padding:6px 12px;border-radius:999px;background:var(--red);color:#fff}
  .sech{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#fff;margin-top:2px}
  .muted2{font-size:11px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--muted)}
  .tgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
  .vs{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:17px;
    color:#fff;background:linear-gradient(135deg,var(--navy),var(--teal));border:2px solid rgba(255,255,255,.18);
    box-shadow:0 4px 14px rgba(0,0,0,.45);letter-spacing:.02em}
  .tcard{position:relative;padding:0;border:2px solid var(--line);border-radius:18px;overflow:hidden;
    background:#0b0f17;cursor:pointer;font-family:inherit;text-align:left;color:var(--text)}
  .tvid{display:block;width:100%;aspect-ratio:1/1;object-fit:cover;background:#000}
  .tcap{padding:10px 12px 12px}
  .tnm{font-size:15px;font-weight:900;line-height:1.15}
  .tsub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.25}
  .tcheck{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;display:none;
    place-items:center;font-weight:900;color:#06121a;background:var(--green)}
  .tcard[data-sel="1"]{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 22px rgba(84,196,180,.30)}
  .tcard[data-sel="1"] .tcheck{display:grid}
  .bnav{display:flex;justify-content:space-around;align-items:center;margin-top:6px;padding:12px 8px;
    border-top:1px solid var(--line);font-size:20px;color:var(--muted)}
  .bnav span{opacity:.45}
  .bnav .bnav-c{width:46px;height:46px;border-radius:50%;background:var(--red);color:#fff;display:grid;
    place-items:center;font-size:22px;opacity:1;box-shadow:0 6px 18px rgba(232,85,77,.4)}
  /* ===== Lenguaje visual unificado: glass + glows + feedback ===== */
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(120% 70% at 0% 0%, rgba(25,195,214,.16), transparent 46%),
               radial-gradient(120% 70% at 100% 100%, rgba(255,140,90,.15), transparent 46%)}
  .field,.mcase,.teamsel button,.tcard,.react button{
    background:rgba(20,28,42,.80)!important;border:1px solid rgba(255,255,255,.08)!important;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .field{border-radius:16px}
  .mcase{border-radius:18px}
  .teamsel button{border-radius:18px}
  .teamsel button[data-sel="1"]{border-color:var(--green)!important;background:rgba(84,196,180,.14)!important;
    box-shadow:0 0 0 1px var(--green),0 0 22px rgba(84,196,180,.28)}
  .tcard[data-sel="1"]{border-color:var(--green)!important}
  .opt{background:rgba(20,28,42,.80)!important;border:1px solid rgba(255,255,255,.10)!important;
    border-radius:16px!important;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .opt[data-sel="1"]{border-color:var(--green)!important;background:rgba(84,196,180,.16)!important;
    box-shadow:0 0 0 1px var(--green),0 0 22px rgba(84,196,180,.28)}
  .opt[data-correct="1"]{border-color:var(--green)!important;background:rgba(84,196,180,.18)!important}
  .opt[data-wrong="1"]{border-color:var(--navy)!important;opacity:.6}
  .btn{border-radius:16px;transition:transform .08s ease,box-shadow .2s}
  .btn:active,.opt:active,.teamsel button:active,.tcard:active{transform:scale(.97)}
</style>
</head><body>
<div id="app">
  <div class="topbar">
    <div class="brand" style="font-size:15px">El Partido <span class="kc">de la Evidencia</span></div>
    <div id="meChip"></div>
  </div>
  <div class="body" id="view"></div>
</div>
<div id="cfgnote"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="../assets/firebase.js"></script>
<script src="../assets/common.js"></script>
<script src="../assets/cases.js?v=17"></script>
<script>
const view = document.getElementById("view");
const meChip = document.getElementById("meChip");
let ME = { nombre:null, equipo:null, registrado:false };
let EV = { estado:"lobby", caso_actual:1 };
let miRespuesta = null, selTeam = null, timerInt=null, lastVibSec=null, ready=false;

function casoActual(){ return CASOS.find(c=>c.id===(EV.caso_actual||1)) || CASOS[0]; }
function enPenalesM(){ return EV.modo==="penales"; }
function preguntaActualM(){ return enPenalesM() ? (PENALES[(EV.penal||1)-1]) : casoActual(); }
function qKeyM(){ return enPenalesM() ? ("P"+(EV.penal||1)) : (EV.caso_actual||1); }
function chip(){
  if(!ME.equipo){ meChip.innerHTML=""; return; }
  const t = TEAMS[ME.equipo];
  meChip.innerHTML = `<span class="chip ${ME.equipo}">${t.emoji} ${escapeHTML(ME.nombre||"")}</span>`
    + `<button class="leave" onclick="salir()">Salir</button>`;
}
function salir(){
  if(!confirm("¿Salir del equipo? Dejarás de contar en el marcador.")) return;
  if(ready && window.MI_UID){
    const ref = db.ref("jugadores/"+window.MI_UID);
    ref.child("conectado").onDisconnect().cancel();
    ref.remove();
  }
  ME = { nombre:null, equipo:null, registrado:false };
  selTeam = null; miRespuesta = null;
  render();
}

/* ---------- Registro ---------- */
function renderRegistro(){
  view.innerHTML = `
    <div class="reg">
      <div class="hero">
        <img class="kclogo" src="../assets/logo-kicab-b.png" alt="Ki-CAB Tegoprazán">
        <h1 class="rtitle">EL PARTIDO<br>DE LA EVIDENCIA</h1>
        <div class="pills2">
          <span class="pill2 xp">🏆 Juega en equipo</span>
          <span class="pill2">⏱ En vivo</span>
        </div>
        <div class="tags2">
          <span class="tagpill">RAPIDEZ</span><span class="tagpill">CONTROL 24H</span><span class="tagpill">DÍA 1</span>
        </div>
      </div>

      <div class="sech">Nombre completo</div>
      <input id="nm" class="field" placeholder="Nombre completo" maxlength="40" autocomplete="name">

      <div class="sech">Elige tu equipo <span class="muted2">· puedes ir con tus amigos</span></div>
      <div class="tgrid">
        <button class="tcard" id="bR" onclick="pickTeam('rapido')">
          <video class="tvid" src="../assets/escudo_inicio_rapido.mp4" poster="../assets/escudo_inicio_rapido.png"
            autoplay loop muted playsinline preload="auto"></video>
          <div class="tcap"><div class="tnm">Inicio Rápido</div><div class="tsub">Actuar desde el 1er momento</div></div>
          <div class="tcheck">✓</div>
        </button>
        <div class="vs">VS</div>
        <button class="tcard" id="bC" onclick="pickTeam('control')">
          <video class="tvid" src="../assets/escudo_control_sostenido.mp4" poster="../assets/escudo_control_sostenido.png"
            autoplay loop muted playsinline preload="auto"></video>
          <div class="tcap"><div class="tnm">Control Sostenido</div><div class="tsub">Mantener el control 24 h</div></div>
          <div class="tcheck">✓</div>
        </button>
      </div>

      <button class="btn wide lg" id="entrar" disabled onclick="entrar()">Entrar al partido →</button>
    </div>`;
  document.getElementById("nm").addEventListener("input", refreshEntrar);
}
function pickTeam(t){
  selTeam = t;
  document.getElementById("bR").dataset.sel = t==="rapido"?"1":"";
  document.getElementById("bC").dataset.sel = t==="control"?"1":"";
  refreshEntrar();
}
function refreshEntrar(){
  const nm = (document.getElementById("nm")||{}).value || "";
  document.getElementById("entrar").disabled = !(nm.trim().length>=2 && selTeam);
}
function entrar(){
  const nm = document.getElementById("nm").value.trim();
  ME.nombre = nm; ME.equipo = selTeam; ME.registrado = true;
  if(ready){
    const ref = db.ref("jugadores/"+window.MI_UID);
    ref.set({ nombre:nm, equipo:selTeam, conectado:true });
    ref.child("conectado").onDisconnect().set(false);
  }
  chip(); render();
}

/* ---------- Estados de juego ---------- */
function watch(txt, em){
  view.innerHTML = `<div class="watch"><div class="em">${em||"👀"}</div><h2>${txt}</h2></div>`;
}
/* Contexto del caso (texto + imagen, sin pregunta) */
function renderContexto(){
  const c = casoActual();
  view.innerHTML = `<div class="mcase"><div class="lbl">Contexto · Caso ${EV.caso_actual}</div>
      <div class="ct">${escapeHTML(c.caso)}</div>
      ${c.imagen ? `<img class="mcaseimg" src="../assets/${c.imagen}" alt="">` : ""}</div>
    <p class="muted" style="text-align:center;margin-top:10px">👀 Lee el contexto — también está en la pantalla</p>`;
}
/* Lectura sincronizada: el médico lee la pregunta/opciones igual que en la pantalla */
function renderLectura(showOpts){
  const c = preguntaActualM();
  const lbl = enPenalesM() ? ("Penal "+(EV.penal||1)) : ("Pregunta · Caso "+EV.caso_actual);
  let html = `<div class="mcase"><div class="lbl">${lbl}</div>
      <div class="qq">${escapeHTML(c.pregunta)}</div></div>`;
  if(showOpts){
    html += `<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">`
      + opcionKeys(c).map(k=>`<button class="opt" disabled>
          <span class="k ${k}">${k}</span><span>${escapeHTML(c.opciones[k])}</span></button>`).join("")
      + `</div><p class="muted" style="text-align:center;margin-top:10px">Prepárate… podrás responder en unos segundos</p>`;
  } else {
    html += `<p class="muted" style="text-align:center;margin-top:12px">👀 Lee el caso — también está en la pantalla</p>`;
  }
  view.innerHTML = html;
}
function renderResponder(){
  const c = preguntaActualM();
  view.innerHTML = `
    <div class="mcase"><div class="qq">${escapeHTML(c.pregunta)}</div></div>
    <div id="mtimer" class="timer">--</div>
    <p class="muted" style="text-align:center;margin:0 0 4px">Toca tu respuesta · puedes cambiar hasta el silbato</p>
    <div style="display:flex;flex-direction:column;gap:12px" id="optwrap">
      ${opcionKeys(c).map(k=>`<button class="opt" data-k="${k}" onclick="responder('${k}')">
        <span class="k ${k}">${k}</span><span>${escapeHTML(c.opciones[k])}</span></button>`).join("")}
    </div>`;
  marcarSel();
  startTimer();
}
function marcarSel(){
  document.querySelectorAll("#optwrap .opt").forEach(b=>{
    b.dataset.sel = (b.dataset.k===miRespuesta)?"1":"";
  });
}
function responder(k){
  if(EV.estado!=="responder") return;
  const s = segRestantes(EV.cronometro);
  if(s<=0) return;
  miRespuesta = k; marcarSel();
  if(ready) db.ref(`respuestas/${qKeyM()}/${window.MI_UID}`).set({ opcion:k, ts:serverNow(), nombre:ME.nombre, equipo:ME.equipo });
  if(navigator.vibrate) navigator.vibrate(30);
}
function startTimer(){
  const el = document.getElementById("mtimer");
  function tick(){
    const s = segRestantes(EV.cronometro);
    if(el){ el.textContent=s; el.className="timer"+(s<=5?" crit":(s<=10?" low":"")); }
    if(s<=5 && s>0 && navigator.vibrate && lastVibSec!==s){ lastVibSec=s; navigator.vibrate(70); }
  }
  tick(); if(timerInt) clearInterval(timerInt); timerInt=setInterval(tick,250);
}
function renderResultado(){
  const c = preguntaActualM();
  const acerto = esCorrecta(c, miRespuesta);
  const sinResp = !miRespuesta;
  const corrLbl = correctSet(c).length>1 ? "Respuestas correctas" : "Respuesta correcta";
  let html = `<div class="result-big" style="color:${acerto?'var(--green)':'var(--red)'}">${acerto?'✓ ¡Acertaste!':(sinResp?'⏱ Sin respuesta':'✗ Fallaste')}</div>
    <p class="muted" style="text-align:center;margin:4px 0">${corrLbl}: <b style="color:var(--green)">${correctasTexto(c)}</b></p>
    <div class="reacth">👇 Toca para enviar un ánimo a la pantalla del salón</div>
    <div class="react">
      <button onclick="reaccion('👏')"><span class="re">👏</span><span class="rl">Aplausos</span></button>
      <button onclick="reaccion('⚽')"><span class="re">⚽</span><span class="rl">¡Gol!</span></button>
      <button onclick="reaccion('🔥')"><span class="re">🔥</span><span class="rl">¡Fuego!</span></button></div>`;
  if(!acerto){
    html += `<button class="btn ghost wide" style="margin-top:14px" id="varbtn" onclick="pedirVar()">🤚 No estoy de acuerdo · Pedir VAR</button>`;
  }
  view.innerHTML = html;
}
function reaccion(em){ if(ready) db.ref("reacciones").push({ emoji:em, equipo:ME.equipo, ts:serverNow() }); }
function pedirVar(){
  if(ready) db.ref("var_solicitudes/"+window.MI_UID).set(ME.equipo);
  const b=document.getElementById("varbtn"); if(b){ b.textContent="✔ VAR solicitado"; b.disabled=true; }
}
function renderFinal(){
  view.innerHTML = `<h2>🏁 Resumen del partido</h2>
    <p class="muted" style="margin:0">Tus aprendizajes para llevar:</p>
    <ul class="learn">${CASOS.map(c=>`<li><b>Caso ${c.id}.</b> ${correctSet(c).length>1?'Correctas':'Correcta'}: <span class="ok">${escapeHTML(correctSet(c).map(k=>k+") "+c.opciones[k]).join(" · "))}</span><br>
       <span class="muted">💊 ${escapeHTML(c.mensaje_clave)}</span></li>`).join("")}</ul>
    <p class="muted" style="text-align:center">Gracias por jugar · Ki-CAB</p>`;
}

function render(){
  if(!ME.registrado){ renderRegistro(); return; }
  chip();
  switch(EV.estado){
    case "lobby":      watch("Esperando a que inicie el partido…","⏳"); break;
    case "presentacion": watch("Presentación del ponente — mira la pantalla","🎤"); break;
    case "contexto":   watch("Contexto del caso — mira la pantalla","👀"); break;
    case "transicion": watch("Medio tiempo — mira la pantalla","⏸️"); break;
    case "cortinilla": watch("Pregunta "+EV.caso_actual,"⚽"); break;
    case "pregunta":   renderLectura(false); break;
    case "opciones":   renderLectura(true); break;
    case "responder":  renderResponder(); break;
    case "bloqueo":    watch(miRespuesta?"Respuesta enviada ✓":"No respondiste a tiempo","🔒"); break;
    case "resultado":  renderResultado(); break;
    case "var":        watch("Vamos al VAR — revisando la evidencia","🟥"); break;
    case "penintro":   watch("¡Vamos a penales!","🥅"); break;
    case "cierre":     watch("Siguiente jugada…","➡️"); break;
    case "final":      renderFinal(); break;
    case "despedida":  renderFinal(); break;
    default:           watch("Conectando…","⏳");
  }
}

fbOnReady(()=>{
  ready=true; document.getElementById("cfgnote").textContent="";
  watchServerOffset(db);
  if(ME.registrado){
    const ref=db.ref("jugadores/"+window.MI_UID);
    ref.set({nombre:ME.nombre,equipo:ME.equipo,conectado:true});
    ref.child("conectado").onDisconnect().set(false);
  }
  db.ref("evento").on("value", s=>{
    const prev=EV.estado, prevPenal=EV.penal; EV=s.val()||{estado:"lobby",caso_actual:1};
    if(EV.estado==="responder" && prev!=="responder"){ miRespuesta=null; lastVibSec=null; }
    if(EV.estado==="cortinilla" || EV.estado==="penintro" || EV.penal!==prevPenal){ miRespuesta=null; }
    render();
    // recupera mi respuesta si recargo a media pregunta
    const k=qKeyM();
    db.ref(`respuestas/${k}/${window.MI_UID}`).once("value").then(r=>{
      if(r.exists() && (EV.estado==="responder"||EV.estado==="bloqueo"||EV.estado==="resultado")){ miRespuesta=r.val().opcion; if(EV.estado==="responder") marcarSel(); }
    });
  });
});
// Feedback táctil al pulsar botones/opciones
document.addEventListener("pointerdown", e=>{
  if(e.target.closest && e.target.closest(".btn,.opt,.teamsel button,.tcard") && navigator.vibrate){ try{ navigator.vibrate(12); }catch(_){} }
});
render();
</script>
</body></html>
