<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El Partido de la Evidencia · Ki-CAB</title>
<link rel="stylesheet" href="assets/style.css">
<style>
 a.card{display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--panel);
  border:1px solid var(--line);border-radius:16px;padding:20px;text-decoration:none;color:var(--text);
  width:230px;transition:.12s}
 a.card:hover{border-color:var(--green)}
 a.card .t{font-weight:800;font-size:18px;margin-bottom:4px}
 a.card .d{color:var(--muted);font-size:13px;min-height:34px}
 a.card .qr{background:#fff;padding:12px;border-radius:12px;margin-top:14px;line-height:0}
 a.card .qr img,a.card .qr canvas{display:block;width:160px;height:160px}
 a.card .scan{margin-top:10px;font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--muted)}
</style>
</head><body>
<div class="fill center pad">
  <div class="tag">Polar Multimedia · Carnot / Ki-CAB</div>
  <h1 class="brand" style="font-size:38px;margin:10px 0 4px">El Partido <span class="kc">de la Evidencia</span></h1>
  <p class="muted" style="margin:0 0 26px">Escanea o haz clic para entrar a cada vista</p>
  <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:1040px">
    <a class="card" href="pantalla/"><div class="t accent">📺 Pantalla</div><div class="d">Proyección en el salón</div><div class="qr" data-path="pantalla/"></div><div class="scan">Escanéame</div></a>
    <a class="card" href="moderador/"><div class="t" style="color:var(--warn)">🎛️ Control</div><div class="d">Animador / host (smartphone)</div><div class="qr" data-path="moderador/"></div><div class="scan">Escanéame</div></a>
    <a class="card" href="mesa/"><div class="t teal" style="color:var(--teal)">📱 Médico</div><div class="d">Participante</div><div class="qr" data-path="mesa/"></div><div class="scan">Escanéame</div></a>
    <a class="card" href="ponente/"><div class="t" style="color:#ff9f43">🎤 Ponente</div><div class="d">Avanza slides de contexto y VAR</div><div class="qr" data-path="ponente/"></div><div class="scan">Escanéame</div></a>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const base = location.origin + location.pathname.replace(/index\.html$/i,"").replace(/\/?$/,"/");
  document.querySelectorAll(".qr").forEach(el=>{
    const url = base + el.dataset.path;
    if(typeof QRCode!=="undefined") new QRCode(el, { text:url, width:160, height:160, colorDark:"#0a0e15", colorLight:"#ffffff" });
  });
</script>
</body></html>
