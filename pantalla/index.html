<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pantalla · El Partido de la Evidencia</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  html{background:#0a0e15}
  body{overflow:hidden;background:transparent}
  #bgloop{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;opacity:0;transition:opacity .9s ease}
  #bgveil{position:fixed;inset:0;z-index:-1;background:linear-gradient(rgba(8,11,17,.50),rgba(8,11,17,.74));opacity:0;transition:opacity .9s ease}
  body.bgon #bgloop, body.bgon #bgveil{opacity:1}
  #cortvid{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:40;opacity:0;pointer-events:none;transition:opacity .4s}
  #cortvid.show{opacity:1}
  #prep{position:fixed;inset:0;z-index:60;background:#0a0e15;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:30px}
  #prep .pbar{width:360px;max-width:80vw;height:10px;border-radius:999px;background:#1b2433;overflow:hidden}
  #prep .pfill{height:100%;width:0;background:var(--green);transition:width .2s}
  #ctxoverlay{position:fixed;inset:0;z-index:45;background:rgba(8,11,17,.93);display:none;align-items:center;justify-content:center;padding:30px}
  #ctxoverlay.show{display:flex}
  .ctxslide{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .ctxslide video, .ctxslide img{max-width:100%;max-height:94vh;object-fit:contain;border-radius:8px}
  #qroverlay{position:fixed;inset:0;z-index:48;background:rgba(8,11,17,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center}
  #qroverlay.show{display:flex}
  #qrbig{background:#fff;padding:22px;border-radius:18px}
  .qrteams{display:flex;gap:60px;align-items:stretch;justify-content:center;flex-wrap:wrap}
  .qrteam{display:flex;flex-direction:column;align-items:center;gap:16px;background:rgba(20,28,42,.85);
    border:3px solid;border-radius:24px;padding:28px 34px}
  .qrteam.qteal{border-color:var(--teal)} .qrteam.qgreen{border-color:var(--green)}
  .qrteam .qresc{height:120px;width:auto;border-radius:12px;background:#000}
  .qrteam .qrnom{font-size:32px;font-weight:900}
  .qrteam.qteal .qrnom{color:var(--teal)} .qrteam.qgreen .qrnom{color:var(--green)}
  .qrteam .qrbox{background:#fff;padding:18px;border-radius:16px}
  .qrteam .qrhint{font-size:20px;font-weight:700;color:#dfe7ef}
  #equiposovl{position:fixed;inset:0;z-index:53;background:rgba(8,11,17,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
  #equiposovl.show{display:flex}
  #equiposovl .eqtt{font-size:44px;font-weight:900}
  #equiposovl .eqgrid{display:flex;gap:34px;width:100%;max-width:1500px;justify-content:center;align-items:flex-start}
  #equiposovl .eqcol{flex:1;max-width:680px;background:rgba(20,28,42,.85);border:2px solid;border-radius:22px;padding:24px 28px}
  #equiposovl .eqh{font-size:30px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  #equiposovl .eqh .n{margin-left:auto;font-size:22px;opacity:.85}
  #equiposovl ul{margin:0;padding:0;list-style:none;column-gap:30px;font-size:24px;line-height:1.5}
  #equiposovl li{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.07)}
  #equiposovl .vacio{color:var(--muted);font-size:22px}
  #musica{position:fixed;inset:0;z-index:52;background:#000;display:none}
  #musica.show{display:block}
  #musica iframe{width:100%;height:100%;border:0}
  #musica video{width:100%;height:100%;object-fit:cover}
  #loopfull{position:fixed;inset:0;z-index:55;background:#000;display:none}
  #loopfull.show{display:block}
  #loopfull video{width:100%;height:100%;object-fit:cover}
  #presenta{position:fixed;inset:0;z-index:54;background:#000;display:none;align-items:center;justify-content:center}
  #presenta.show{display:flex}
  #presenta video{width:100%;height:100%;object-fit:cover}
  #presenta .pendiente{color:#fff;font-size:30px}
  #empate{position:fixed;inset:0;z-index:56;background:#000;display:none}
  #empate.show{display:block}
  #empate video{width:100%;height:100%;object-fit:cover}
  /* Animación de GOL (overlay 3s) */
  #golanim{position:fixed;inset:0;z-index:57;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:radial-gradient(circle at 50% 42%, rgba(0,0,0,.45), rgba(4,7,12,.95))}
  #golanim.show{display:flex}
  #golanim .golttl{font-weight:900;font-size:150px;line-height:.85;letter-spacing:.02em;
    text-shadow:0 8px 40px rgba(0,0,0,.6);animation:golpop .5s cubic-bezier(.2,1.5,.4,1) both}
  #golanim .golpopwrap{perspective:1400px;animation:golpop .55s cubic-bezier(.2,1.5,.4,1) both}
  #golanim .escudo{height:300px;width:auto;max-width:70vw;object-fit:contain;background:#000;border-radius:18px;
    animation:spinY 2.4s linear infinite}
  #golanim .golteam{font-weight:900;font-size:46px;animation:golpop .6s ease both}
  @keyframes golpop{from{opacity:0;transform:scale(.35)}to{opacity:1;transform:scale(1)}}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column}
  /* scoreboard superior */
  #scoreboard{display:flex;align-items:center;justify-content:space-between;gap:20px;
    padding:18px 34px;border-bottom:1px solid var(--line);background:rgba(10,14,21,.7)}
  #scoreboard .t{display:flex;align-items:center;gap:14px;font-weight:800;font-size:22px}
  #scoreboard .e{font-size:30px}
  .teamlogo{height:62px;width:auto;max-width:130px;object-fit:contain;border-radius:8px;display:block;background:#000}
  #scoreboard .num{font-size:46px;font-weight:900;font-variant-numeric:tabular-nums}
  #scoreboard .mid{text-align:center;color:var(--muted)}
  #scoreboard .mid .vs{font-size:20px;font-weight:900;color:var(--text)}
  #scoreboard .mid .caso{font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  #main{flex:1;position:relative;overflow:hidden}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:34px 56px}
  .big{font-size:84px;font-weight:900;letter-spacing:-.02em;line-height:1}
  .casebox{max-width:1100px;width:100%;background:rgba(18,26,38,.86);border:1px solid var(--line);
    border-radius:22px;padding:34px 40px;text-align:left}
  .casebox .lbl{font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:800}
  .casebox .ctext{font-size:30px;line-height:1.35;margin:8px 0 22px}
  .casebox .q{font-size:34px;font-weight:800;line-height:1.25}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1240px;width:100%;margin-top:26px}
  .opts .opt{font-size:27px;padding:24px 24px;cursor:default;line-height:1.3;align-items:flex-start}
  .opts .opt .k{width:54px;height:54px;font-size:27px;flex:0 0 auto}
  .casebox .q{font-size:40px;line-height:1.3}
  .casebox .ctext{font-size:32px;line-height:1.4}
  #timer{font-size:120px}
  .countbar{margin-top:26px;font-size:24px;color:var(--muted)}
  .msgkey{margin-top:22px;background:rgba(140,224,33,.12);border:1px solid rgba(140,224,33,.4);
    border-radius:16px;padding:20px 28px;font-size:26px;font-weight:700;max-width:1100px}
  .ponente-chip{margin-top:18px;display:inline-flex;align-items:center;gap:18px;
    background:rgba(25,195,214,.16);border:1px solid rgba(25,195,214,.5);border-radius:24px;
    padding:12px 28px 12px 16px;font-size:24px;font-weight:600;color:#eaf7fb;text-align:left}
  .ponente-chip .arb-foto{height:96px;width:auto;display:block}
  .ponente-chip b{color:var(--teal);font-size:28px}
  /* La opción correcta: el texto ocupa su ancho y el badge va en su PROPIA línea (no deforma) */
  .opt{flex-wrap:wrap}
  .opt .ot{flex:1 1 0;min-width:0}
  .okline{flex:0 0 100%;margin-top:10px}
  .okmark{display:inline-block;background:var(--green);color:#06210a;font-weight:900;
    font-size:19px;padding:7px 16px;border-radius:999px;letter-spacing:.04em;white-space:nowrap;
    box-shadow:0 4px 16px rgba(140,224,33,.5)}
  /* Transición suave al cambiar de slide (contexto / VAR) */
  @keyframes slidein{from{opacity:0;transform:scale(1.015)}to{opacity:1;transform:scale(1)}}
  .slidefx{animation:slidein .42s ease}
  /* Pantalla ¡Tiempo! con foto del árbitro */
  .tiempo-solo{display:flex;flex-direction:column;align-items:center;gap:12px}
  .tiempo-arb{height:320px;width:auto;filter:drop-shadow(0 14px 30px rgba(0,0,0,.6))}
  .evid{max-width:1280px;text-align:left;background:rgba(18,26,38,.9);border:1px solid var(--line);
    border-radius:22px;padding:30px 38px}
  .evidrow{display:flex;gap:26px;align-items:center}
  .evidrow ul{flex:1;margin:0;padding-left:22px}
  .evidimg{flex:0 0 44%;max-width:44%;max-height:48vh;border-radius:12px;background:#fff}
  .varfull{max-width:100%;max-height:94vh;width:auto;display:block;border-radius:8px}
  .evid h3{font-size:30px;margin:0 0 14px}
  .evid li{font-size:21px;line-height:1.35;margin-bottom:9px}
  .caseimg{display:block;max-width:100%;max-height:40vh;border-radius:12px;margin:10px 0 16px}
  .fuentes{margin-top:14px;font-size:14px;color:var(--muted);line-height:1.4;border-top:1px solid var(--line);padding-top:10px}
  #varAlarm{position:absolute;top:18px;left:50%;transform:translateX(-50%);
    background:var(--red);color:#fff;font-weight:800;font-size:20px;padding:12px 24px;border-radius:999px}
  #qr{background:#fff;padding:16px;border-radius:16px}
  .qrslot{min-height:300px;display:flex;align-items:center;justify-content:center;margin:6px 0}
  .lobbybanner{display:flex;align-items:center;justify-content:center;gap:34px;background:#000;
    border:1px solid var(--line);border-radius:20px;padding:18px 44px}
  .lb-team{display:flex;flex-direction:column;align-items:center;gap:4px}
  .lb-logo{height:104px;width:auto;max-width:280px;object-fit:contain;background:#000}
  .lb-name{font-size:22px;font-weight:800}
  .lb-name b{font-weight:900;font-size:26px}
  .lb-vs{font-size:34px;font-weight:900;color:#fff;background:linear-gradient(135deg,#27398D,#19c3d6);
    width:70px;height:70px;border-radius:50%;display:grid;place-items:center;border:2px solid rgba(255,255,255,.18);
    box-shadow:0 6px 18px rgba(0,0,0,.5);flex:0 0 auto}
  #reactions{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}
  .rfly{position:absolute;font-size:54px;animation:floatUp 2.6s ease-out forwards}
  .champ{font-size:30px}
  .spinwrap{perspective:1400px;margin:4px 0}
  .spinlogo{height:320px;width:auto;max-width:78vw;object-fit:contain;background:#000;border-radius:18px;
    animation:spinY 4.5s linear infinite}
  @keyframes spinY{to{transform:rotateY(360deg)}}
  #cfgnote{position:fixed;bottom:10px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px}
</style>
</head><body>
<video id="bgloop" loop muted autoplay playsinline preload="auto" poster="../assets/loop_poster.jpg">
  <source src="../assets/loop.mp4" type="video/mp4"></video>
<div id="bgveil"></div>
<video id="cortvid" playsinline preload="auto"></video>
<div id="stage">
  <div id="scoreboard">
    <div class="t"><video class="teamlogo" src="../assets/escudo_inicio_rapido.mp4" poster="../assets/escudo_inicio_rapido.png" autoplay loop muted playsinline></video><span>Inicio Rápido</span><span class="num" id="sRapido" style="color:var(--teal)">0</span></div>
    <div class="mid"><div class="caso" id="casoLbl">Esperando</div><div class="vs">VS</div></div>
    <div class="t"><span class="num" id="sControl" style="color:var(--green)">0</span><span>Control Sostenido</span><video class="teamlogo" src="../assets/escudo_control_sostenido.mp4" poster="../assets/escudo_control_sostenido.png" autoplay loop muted playsinline></video></div>
  </div>
  <div id="main"><div id="scene" class="scene"></div></div>
</div>
<div id="ctxoverlay"></div>
<div id="qroverlay"></div>
<div id="musica"></div>
<div id="loopfull"><video id="loopfullvid" src="../assets/loop.mp4" autoplay loop muted playsinline></video></div>
<div id="presenta"></div>
<div id="empate"></div>
<div id="equiposovl"></div>
<div id="golanim"></div>
<div id="reactions"></div>
<div id="cfgnote"></div>

<div id="prep">
  <div class="tag">El Partido de la Evidencia · Pantalla</div>
  <h1 class="brand" style="font-size:46px;margin:0">Preparar <span class="kc">pantalla</span></h1>
  <p class="muted" style="max-width:540px;font-size:18px;margin:0">Haz clic una vez antes de iniciar el evento: activa el audio y precarga las cortinillas para que corran sin internet durante el show.</p>
  <button class="btn lg" id="prepBtn" onclick="prepStart()">▶ Preparar pantalla</button>
  <div class="pbar hidden" id="pbar"><div class="pfill" id="pfill"></div></div>
  <div class="muted" id="pmsg" style="font-size:14px;min-height:18px"></div>
  <button class="btn ghost" onclick="prepSkip()" style="font-size:13px;padding:8px 14px">Saltar (sin precargar)</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="../assets/firebase.js"></script>
<script src="../assets/common.js"></script>
<script src="../assets/cases.js?v=21"></script>
<script>
const scene = document.getElementById("scene");
const casoLbl = document.getElementById("casoLbl");
let STATE = { evento:{estado:"lobby",caso_actual:1}, equipos:{}, jugadores:{}, respuestas:{}, var_solicitudes:{} };
let lastReactKey = null, timerInt = null, autoClosed = false;

/* ---- Cortinillas de video (precarga + audio) ---- */
const CORT_URLS = {};   // archivo -> blob URL tras precargar
const DESPEDIDA = "despedida.mp4";
function cortFiles(){ return []; }  // sin precarga: streaming bajo demanda (preparación instantánea)
function cortPath(f){ return "../assets/"+f; }
let PREPARED = false;
const cortvid = document.getElementById("cortvid");
const bgloop  = document.getElementById("bgloop");
const silbato = new Audio("../assets/silbato.mp3");
silbato.preload = "auto";
const reloj = new Audio("../assets/reloj.mp3");
reloj.preload = "auto"; reloj.loop = true;
let lastWhistleState = null, varTimer = null, alarmTimer = null, lastSceneKey = "__none__", varAlarmKey = null, lastGolKey = null, golTO = null;
function showGolAnim(team){
  const t = TEAMS[team]; if(!t) return;
  const file = team==="rapido" ? "escudo_inicio_rapido" : "escudo_control_sostenido";
  const o = document.getElementById("golanim");
  o.innerHTML = `<div class="golttl" style="color:${t.color}">¡GOOOL!</div>
    <div class="golpopwrap"><video class="escudo" src="../assets/${file}.mp4" poster="../assets/${file}.png" autoplay loop muted playsinline></video></div>
    <div class="golteam" style="color:${t.color}">${t.emoji} ${t.nombre}</div>`;
  o.classList.add("show");
  clearTimeout(golTO);
  golTO = setTimeout(()=>{ o.classList.remove("show"); o.innerHTML=""; }, 3000);
}
const WHISTLE = '<svg viewBox="0 0 64 40" width="78" height="48" style="vertical-align:-10px;margin-right:8px"><path fill="#f2b53b" d="M2 12h26l12-7v10h16a7 7 0 0 1 0 14H40v9l-12-7H22A18 18 0 1 1 2 12z"/><circle cx="22" cy="22" r="9" fill="#0a0e15"/></svg>';
cortvid.addEventListener("error", ()=>cortvid.classList.remove("show"));  // si falla, cae a cortinilla CSS
cortvid.addEventListener("ended", ()=>{ /* mantiene último cuadro hasta que el operador avance */ });

function prepStart(){
  unlockAudio();
  document.getElementById("prepBtn").disabled = true;
  document.getElementById("pbar").classList.remove("hidden");
  preloadAll().finally(finishPrep);
}
function prepSkip(){ unlockAudio(); finishPrep(); }
function finishPrep(){ PREPARED = true; document.getElementById("prep").classList.add("hidden"); }
function unlockAudio(){
  const first = cortFiles()[0];
  try{
    if(first){ cortvid.src = cortPath(first); cortvid.muted = false;
      cortvid.play().then(()=>{ cortvid.pause(); cortvid.currentTime = 0; }).catch(()=>{}); }
  }catch(e){}
  if(bgloop && bgloop.play) bgloop.play().catch(()=>{});
  try{ silbato.play().then(()=>{ silbato.pause(); silbato.currentTime=0; }).catch(()=>{}); }catch(e){}
  try{ reloj.play().then(()=>{ reloj.pause(); reloj.currentTime=0; }).catch(()=>{}); }catch(e){}
}
async function preloadAll(){
  const files = cortFiles(), fill=document.getElementById("pfill"), msg=document.getElementById("pmsg");
  for(let i=0;i<files.length;i++){
    try{
      const res = await fetch(cortPath(files[i])); if(!res.ok) throw 0;
      const total = +(res.headers.get("Content-Length")||0);
      const reader = res.body.getReader(); let rec=0; const chunks=[];
      while(true){ const {done,value}=await reader.read(); if(done) break; chunks.push(value); rec+=value.length;
        const p = total? rec/total : 0; fill.style.width = Math.round(((i+p)/files.length)*100)+"%";
        msg.textContent = "Precargando "+(i+1)+"/"+files.length+" · "+Math.round(rec/1048576)+" MB"; }
      CORT_URLS[files[i]] = URL.createObjectURL(new Blob(chunks,{type:"video/mp4"}));
      fill.style.width = Math.round(((i+1)/files.length)*100)+"%";
    }catch(e){ /* archivo faltante: usará streaming o cortinilla CSS */ }
  }
  msg.textContent = "Listo ✓";
}
function playVideo(file){
  if(!file){ stopCortinilla(); return; }                       // sin video -> CSS
  if(cortvid.classList.contains("show") && cortvid.dataset.file===file) return;
  cortvid.dataset.file = file;
  cortvid.src = CORT_URLS[file] || cortPath(file);
  cortvid.currentTime = 0; cortvid.muted = false;
  cortvid.classList.add("show");
  cortvid.play().catch(()=>cortvid.classList.remove("show"));
}
function stopCortinilla(){ if(cortvid.classList.contains("show")){ cortvid.classList.remove("show"); cortvid.pause(); cortvid.dataset.file=""; } }

function casoActual(){ return CASOS.find(c => c.id === (STATE.evento.caso_actual||1)) || CASOS[0]; }
function enPenalesP(){ return STATE.evento.modo==="penales"; }
function preguntaActual(){ return enPenalesP() ? (PENALES[(STATE.evento.penal||1)-1]) : casoActual(); }
function qKeyP(){ return enPenalesP() ? ("P"+(STATE.evento.penal||1)) : (STATE.evento.caso_actual||1); }
function casoClinicoP(){ return (casoActual().caso_clinico)||1; }
function jugadoresPorEquipo(eq){ return Object.values(STATE.jugadores||{}).filter(j=>j.equipo===eq).length; }

function marcadorEquipo(eq){ return enPenalesP() ? ((STATE.equipos[eq]||{}).penales||0) : ((STATE.equipos[eq]||{}).goles||0); }
function pintarScore(){
  document.getElementById("sRapido").textContent = "⚽ " + marcadorEquipo("rapido");
  document.getElementById("sControl").textContent = marcadorEquipo("control") + " ⚽";
  const e = STATE.evento.estado;
  casoLbl.textContent = (e==="lobby") ? "Esperando jugadores"
    : (e==="final") ? "Marcador final"
    : enPenalesP() ? ("Penal " + (STATE.evento.penal||1) + (e==="penintro"?"":(" de "+PENALES.length)))
    : ("Caso " + (STATE.evento.caso_actual||1));
}

function nRespuestas(){
  const r = (STATE.respuestas||{})[qKeyP()] || {};
  return Object.keys(r).length;
}
function nConectados(){ return Object.values(STATE.jugadores||{}).filter(j=>j.conectado!==false).length; }

const IDLE_STATES = ["lobby","cortinilla","cierre","final"];
function paintCtxSlideIdx(media, idx){
  const s = document.querySelector("#ctxoverlay .ctxslide"); if(!s) return;
  const m = media[idx] || media[0];
  s.innerHTML = m.type==="video"
    ? `<video src="../assets/${m.src}" autoplay loop muted playsinline></video>`
    : `<img src="../assets/${m.src}" alt="">`;
}
function renderCtxOverlay(){
  const o = document.getElementById("ctxoverlay");
  const media = contextoPonente(casoClinicoP(), STATE.evento.ponente);
  const has = STATE.evento.mostrar_contexto && media.length;
  if(!has){ o.classList.remove("show"); o.innerHTML=""; o.dataset.on=""; o.dataset.idx=""; return; }
  const idx = Math.min(STATE.evento.ctx_slide||0, media.length-1);
  if(o.dataset.on!=="carousel"){ o.dataset.on="carousel"; o.dataset.idx=""; o.innerHTML = `<div class="ctxslide"></div>`; }
  if(o.dataset.idx!==String(idx)){ o.dataset.idx=String(idx); paintCtxSlideIdx(media, idx); }
  o.classList.add("show");
}
function renderQrOverlay(){
  const o = document.getElementById("qroverlay");
  const ev = STATE.evento;
  const showR = !!ev.qr_rapido, showC = !!ev.qr_control;
  const showG = !!ev.mostrar_qr && !showR && !showC;
  const key = (showR?"R":"")+(showC?"C":"")+(showG?"G":"");
  if(!key){ o.classList.remove("show"); o.dataset.qr=""; o.innerHTML=""; return; }
  if(o.dataset.qr!==key){
    o.dataset.qr = key;
    const baseDir = location.pathname.replace(/pantalla\/?(index\.html)?$/i, "");
    const mesa = (q)=> location.origin + baseDir + "mesa/" + (q?("?equipo="+q):"");
    const mkQR = (el,url,dark)=>{ if(typeof QRCode!=="undefined" && el) new QRCode(el, { text:url, width:340, height:340, colorDark:dark||"#0a0e15", colorLight:"#ffffff" }); };
    if(showR || showC){
      const col = (key)=>{
        const t = key==="rapido" ? {nom:"Inicio Rápido",em:"⚡",cls:"qteal",file:"escudo_inicio_rapido"} : {nom:"Control Sostenido",em:"🛡️",cls:"qgreen",file:"escudo_control_sostenido"};
        return `<div class="qrteam ${t.cls}">
            <video class="qresc" src="../assets/${t.file}.mp4" poster="../assets/${t.file}.png" autoplay loop muted playsinline></video>
            <div class="qrnom">${t.em} ${t.nom}</div>
            <div id="qr_${key}" class="qrbox"></div>
            <div class="qrhint">Escanea para unirte a este equipo</div>
          </div>`;
      };
      o.innerHTML = `<div class="qrteams">${showR?col("rapido"):""}${showC?col("control"):""}</div>`;
      if(showR) mkQR(document.getElementById("qr_rapido"), mesa("rapido"));
      if(showC) mkQR(document.getElementById("qr_control"), mesa("control"));
    } else {
      o.innerHTML = `<div class="tag">Escanea para unirte al partido</div><div id="qrbig"></div>
        <div class="muted" style="font-size:16px;max-width:80vw;word-break:break-all">${escapeHTML(mesa(""))}</div>`;
      mkQR(document.getElementById("qrbig"), mesa(""));
    }
  }
  o.classList.add("show");
}
function renderEquipos(){
  const o = document.getElementById("equiposovl");
  if(!STATE.evento.mostrar_equipos){ o.classList.remove("show"); o.innerHTML=""; return; }
  const lista = eq => {
    const arr = Object.values(STATE.jugadores||{}).filter(j=>j.equipo===eq)
      .map(j=>escapeHTML(j.nombre||"—"));
    if(!arr.length) return `<div class="vacio">Sin jugadores aún</div>`;
    const cols = arr.length>10 ? 2 : 1;
    return `<ul style="column-count:${cols}">${arr.map(n=>`<li>${n}</li>`).join("")}</ul>`;
  };
  o.innerHTML = `<div class="eqtt">Los equipos en la cancha</div>
    <div class="eqgrid">
      <div class="eqcol" style="border-color:var(--teal)">
        <div class="eqh" style="color:var(--teal)">⚡ Inicio Rápido <span class="n">${jugadoresPorEquipo("rapido")}</span></div>
        ${lista("rapido")}
      </div>
      <div class="eqcol" style="border-color:var(--green)">
        <div class="eqh" style="color:var(--green)">🛡️ Control Sostenido <span class="n">${jugadoresPorEquipo("control")}</span></div>
        ${lista("control")}
      </div>
    </div>`;
  o.classList.add("show");
}
function renderMusica(){
  const o = document.getElementById("musica");
  if(STATE.evento.musica){
    if(o.dataset.on!=="1"){
      o.dataset.on="1";
      const src = CORT_URLS["musica.mp4"] || "../assets/musica.mp4";
      o.innerHTML = `<video src="${src}" autoplay loop playsinline></video>`;
    }
    o.classList.add("show");
    const v=o.querySelector("video"); if(v&&v.paused) v.play().catch(()=>{});
  } else {
    o.classList.remove("show"); o.innerHTML=""; o.dataset.on="";
  }
}
function renderLoopFull(){
  const o = document.getElementById("loopfull");
  if(STATE.evento.loop_full){ o.classList.add("show"); const v=document.getElementById("loopfullvid"); if(v&&v.paused) v.play().catch(()=>{}); }
  else o.classList.remove("show");
}
function renderPresenta(){
  const o = document.getElementById("presenta");
  const p = STATE.evento.presentacion;
  if(p==="villar" || p==="cerda"){
    const file = p==="villar" ? "presentacion-villar.mp4" : "presentacion-cerda.mp4";
    if(o.dataset.file!==file){
      o.dataset.file=file;
      o.innerHTML = `<video src="../assets/${file}" autoplay playsinline
        onerror="this.outerHTML='<div class=\\'pendiente\\'>Video de presentación pendiente</div>'"></video>`;
    }
    o.classList.add("show");
    const v=o.querySelector("video"); if(v&&v.paused) v.play().catch(()=>{});
  } else { o.classList.remove("show"); o.innerHTML=""; o.dataset.file=""; }
}
function renderEmpate(){
  const o = document.getElementById("empate");
  if(STATE.evento.empate){
    if(o.dataset.on!=="1"){
      o.dataset.on="1";
      o.innerHTML=`<video src="../assets/empate.mp4" autoplay playsinline></video>`;
      const vd=o.querySelector("video");
      // Al terminar el video "Vamos a penales", continúa solo: revela "¡Vamos a penales!" (penintro)
      vd.onended = ()=>{ if(STATE.evento.modo==="penales"){ db.ref("evento/empate").set(false); } };
    }
    o.classList.add("show");
    const v=o.querySelector("video"); if(v&&v.paused) v.play().catch(()=>{});
  } else { o.classList.remove("show"); o.innerHTML=""; o.dataset.on=""; }
}
function render(){
  pintarScore();
  const e = STATE.evento.estado || "lobby";
  document.body.classList.toggle("bgon", IDLE_STATES.includes(e));
  if(e==="cortinilla") playVideo((casoActual()||{}).cortinilla);
  else if(e==="despedida") playVideo(DESPEDIDA);
  else stopCortinilla();
  if(e==="bloqueo" && lastWhistleState!=="bloqueo"){ try{ silbato.currentTime=0; silbato.play().catch(()=>{}); }catch(_){} }
  lastWhistleState = e;
  // sonido de reloj durante la cuenta regresiva
  if(e==="responder"){ if(reloj.paused){ reloj.currentTime=0; reloj.play().catch(()=>{}); } }
  else { if(!reloj.paused){ reloj.pause(); reloj.currentTime=0; } }
  // (El VAR ya NO es automático: el operador lo abre manualmente desde el control.)
  renderCtxOverlay();
  renderQrOverlay();
  renderEquipos();
  renderMusica();
  renderLoopFull();
  renderPresenta();
  renderEmpate();
  const c = pregEfectiva(preguntaActual(), STATE.evento.ponente);
  if(timerInt){ clearInterval(timerInt); timerInt=null; }

  // La escena con video (presentación/contexto/transición) NO debe reconstruirse en cada
  // instrucción de Firebase, porque eso reinicia el video desde 0. Solo se reconstruye
  // cuando realmente cambia el estado/slide/ponente.
  const videoEscena = (e==="presentacion" || e==="contexto" || e==="transicion");
  const guardEscena = videoEscena || e==="var";   // var también: evita re-render/re-fade en cada instrucción
  const sceneKey = [e, STATE.evento.caso_actual, STATE.evento.penal, STATE.evento.ctx_slide, STATE.evento.var_slide, STATE.evento.trans, STATE.evento.ponente].join("|");
  const skipScene = guardEscena && sceneKey===lastSceneKey;
  lastSceneKey = sceneKey;

  if(!skipScene){
  if(e==="lobby"){
    scene.innerHTML = `
      <div class="lobbybanner" style="margin-top:-20px">
        <div class="lb-team">
          <video class="lb-logo" src="../assets/escudo_inicio_rapido.mp4" poster="../assets/escudo_inicio_rapido.png" autoplay loop muted playsinline></video>
          <div class="lb-name" style="color:var(--teal)">Inicio Rápido <b>${jugadoresPorEquipo("rapido")}</b></div>
        </div>
        <div class="lb-vs">VS</div>
        <div class="lb-team">
          <video class="lb-logo" src="../assets/escudo_control_sostenido.mp4" poster="../assets/escudo_control_sostenido.png" autoplay loop muted playsinline></video>
          <div class="lb-name" style="color:var(--green)">Control Sostenido <b>${jugadoresPorEquipo("control")}</b></div>
        </div>
      </div>
      <div class="qrslot"></div>
      <div class="tag">La evidencia entra a la cancha</div>
      <h1 class="brand" style="font-size:64px;margin:6px 0 0">El Partido <span class="kc">de la Evidencia</span></h1>
      <div style="margin-top:10px;font-size:18px" class="muted">${nConectados()} médicos conectados</div>
      ${STATE.evento.ponente ? `<div class="ponente-chip pop"><img class="arb-foto" src="../assets/arbitro-${STATE.evento.ponente}.png" alt=""><span>Árbitro Oficial del Encuentro:<br><b>${STATE.evento.ponente==="cerda"?"Dr. Eduardo Cerda":"Dra. Alicia Villar"}</b></span></div>` : ""}`;
  }
  else if(e==="cortinilla"){
    scene.innerHTML = `<div class="tag">La evidencia entra a la cancha</div>
      <div class="big pop">PREGUNTA ${STATE.evento.caso_actual}</div>
      <div class="muted" style="font-size:26px;margin-top:14px">Prepárate…</div>`;
  }
  else if(e==="presentacion"){
    const file = STATE.evento.ponente==="cerda" ? "presentacion-cerda.mp4" : "presentacion-villar.mp4";
    scene.innerHTML = `<video class="varfull" src="../assets/${file}" autoplay playsinline></video>`;
  }
  else if(e==="contexto"){
    const media = contextoPonente(casoClinicoP(), STATE.evento.ponente);
    const idx = Math.min(STATE.evento.ctx_slide||0, media.length-1);
    const m = media[idx];
    scene.innerHTML = m
      ? (m.type==="video" ? `<video class="varfull slidefx" src="../assets/${m.src}" autoplay loop muted playsinline></video>`
                          : `<img class="varfull slidefx" src="../assets/${m.src}" alt="">`)
      : `<div class="big">Contexto Caso ${casoClinicoP()}</div>`;
  }
  else if(e==="transicion"){
    const file = STATE.evento.trans==="inicio2T" ? "inicio-segundo-tiempo.mp4" : "final-primer-tiempo.mp4";
    scene.innerHTML = `<video class="varfull" src="../assets/${file}" autoplay playsinline></video>`;
  }
  else if(e==="pregunta"){
    const lbl = enPenalesP() ? ("Penal "+(STATE.evento.penal||1)+" de "+PENALES.length) : ("Pregunta "+(STATE.evento.caso_actual||1)+" · Caso clínico "+casoClinicoP());
    scene.innerHTML = `<div class="casebox pop">
        <div class="lbl">${lbl}</div>
        <div class="q">${escapeHTML(c.pregunta)}</div></div>
      <div class="muted" style="font-size:22px;margin-top:18px">El ponente está leyendo la pregunta…</div>`;
  }
  else if(e==="bloqueo"){
    const arb = STATE.evento.ponente ? `<img class="tiempo-arb" src="../assets/arbitro-${STATE.evento.ponente}.png" alt="">` : WHISTLE;
    scene.innerHTML = `<div class="tiempo-solo pop">${arb}
      <div class="big" style="font-size:96px;line-height:1">¡Tiempo!</div>
      <div class="muted" style="font-size:26px">El árbitro cierra las respuestas</div></div>`;
  }
  else if(e==="opciones" || e==="responder" || e==="resultado"){
    const showTimer = (e==="responder");
    const reveal = (e==="resultado");
    let html = "";
    if(reveal){
      const g = STATE.evento.gol_ronda;
      if(g==="rapido" || g==="control"){ const t=TEAMS[g];
        html += `<div class="big pop" style="font-size:56px;color:${t.color}">⚽ ¡GOL de ${t.nombre}!</div>`;
      } else {
        html += `<div class="big pop" style="font-size:50px">Jugada pareja — sin gol</div>`;
      }
    }
    else { html += `<div class="q" style="font-size:40px;font-weight:800;max-width:1180px;line-height:1.3;letter-spacing:.005em">${escapeHTML(c.pregunta)}</div>`; }
    if(showTimer){ html += `<div id="timer" class="timer">--</div>`; }
    html += `<div class="opts">` + opcionKeys(c).map(k=>{
      const isCorrect = reveal && esCorrecta(c,k);
      return `<button class="opt" ${isCorrect?'data-correct="1"':''} ${reveal&&!isCorrect?'data-wrong="1"':''} disabled>
        <span class="k ${k}">${k}</span><span class="ot">${escapeHTML(c.opciones[k])}</span>${isCorrect?'<span class="okline"><span class="okmark">✓ RESPUESTA CORRECTA</span></span>':''}</button>`;
    }).join("") + `</div>`;
    if(showTimer){ html += `<div class="countbar"><b id="cnt">0</b> de ${nConectados()} respondieron</div>`; }
    if(reveal){
      if(enPenalesP()){
        const ps = STATE.evento.penal_stats || {};
        const row=(t,nm,col)=>{ const s=ps[t]||{aciertos:0,velocidad:0}; return `<div style="color:${col};margin:4px 0">${nm} — Aciertos <b>${s.aciertos}%</b> · Velocidad <b>${s.velocidad}%</b></div>`; };
        html += `<div class="msgkey pop" style="font-size:26px;text-align:left">${row("rapido","⚡ Inicio Rápido","var(--teal)")}${row("control","🛡️ Control Sostenido","var(--green)")}</div>`;
      } else {
        html += `<div class="msgkey pop">💊 ${escapeHTML(c.mensaje_clave||"")}</div>`;
      }
    }
    scene.innerHTML = html;
    if(showTimer) startTimer();
    if(reveal && Object.keys(STATE.var_solicitudes||{}).length){
      const n = Object.keys(STATE.var_solicitudes).length;
      // Clave por ronda: solo mostramos UNA vez por pregunta y se apaga solo a los 10 s.
      const key = (enPenalesP()?"P"+(STATE.evento.penal||0):"Q"+(STATE.evento.caso_actual||0));
      if(varAlarmKey!==key && !document.getElementById("varAlarm")){
        varAlarmKey = key;
        const a = document.createElement("div"); a.id="varAlarm"; a.className="pulse";
        a.textContent = `🚨 VAR solicitado por ${n}`; document.getElementById("main").appendChild(a);
        setTimeout(()=>{ const el=document.getElementById("varAlarm"); if(el){ el.style.transition="opacity .6s"; el.style.opacity="0"; setTimeout(()=>el.remove(),600); } }, 10000);
      }
    }
  }
  else if(e==="var"){
    const vm = varMediaPonente(c, STATE.evento.ponente);
    if(vm && vm.length){
      const idx = Math.min(STATE.evento.var_slide||0, vm.length-1);
      const m = vm[idx] || vm[0];
      scene.innerHTML = m.type==="video"
        ? `<video class="varfull slidefx" src="../assets/${m.src}" autoplay loop muted playsinline></video>`
        : `<img class="varfull slidefx" src="../assets/${m.src}" alt="">`;
    } else if(c.evidencia_imagen){
      scene.innerHTML = `<img class="varfull" src="../assets/${c.evidencia_imagen}" alt="">`;
    } else {
      const ev = c.evidencia||{titulo:"Evidencia",puntos:[]};
      scene.innerHTML = `<div class="tag" style="color:var(--red)">VAR de la evidencia</div>
        <div class="evid pop"><h3>${escapeHTML(ev.titulo)}</h3>
          <ul>${ev.puntos.map(p=>`<li>${escapeHTML(p)}</li>`).join("")}</ul>
          <div style="margin-top:14px;color:var(--green);font-weight:800;font-size:22px">✔ Validado por el profesor experto</div>
          ${(c.fuentes&&c.fuentes.length)?`<div class="fuentes">Fuentes: ${c.fuentes.map(escapeHTML).join("<br>")}</div>`:""}</div>`;
    }
  }
  else if(e==="cierre"){
    scene.innerHTML = `<div class="big pop" style="font-size:54px">Siguiente jugada…</div>`;
  }
  else if(e==="penintro"){
    scene.innerHTML = `<div class="big pop" style="font-size:64px">🥅 ¡VAMOS A PENALES!</div>
      <div class="muted" style="font-size:26px;margin-top:12px">El empate se define desde el punto penal</div>`;
  }
  else if(e==="final"){
    let r, cc;
    if(enPenalesP()){ r=(STATE.equipos.rapido||{}).penales||0; cc=(STATE.equipos.control||{}).penales||0; }
    else { r=puntajeNormalizado((STATE.equipos.rapido||{}).puntaje||0, jugadoresPorEquipo("rapido"));
           cc=puntajeNormalizado((STATE.equipos.control||{}).puntaje||0, jugadoresPorEquipo("control")); }
    const winKey = r>cc ? "rapido" : (cc>r ? "control" : null);
    let html = `<div class="tag">Marcador final</div>`;
    if(winKey){
      const t = TEAMS[winKey];
      const file = winKey==="rapido" ? "escudo_inicio_rapido" : "escudo_control_sostenido";
      html += `<div class="spinwrap"><video class="spinlogo" src="../assets/${file}.mp4" poster="../assets/${file}.png" autoplay loop muted playsinline></video></div>
        <div class="big pop" style="font-size:58px;color:${t.color}">🏆 ${t.nombre}</div>
        <div class="muted" style="font-size:26px;margin-top:4px">¡Campeón!</div>`;
    } else {
      html += `<div class="big pop" style="font-size:60px">¡Empate!</div>`;
    }
    html += `<div style="font-size:26px;margin-top:12px" class="muted">⚡ ${r} &nbsp;·&nbsp; 🛡️ ${cc}</div>
      <div class="msgkey" style="margin-top:22px">🏆 Ki-CAB es la jugada ganadora en acidez, reflujo y gastritis leves/moderadas.</div>`;
    scene.innerHTML = html;
  }
  else if(e==="despedida"){
    scene.innerHTML = `<div class="big pop" style="font-size:56px">¡Gracias por jugar!</div>
      <div class="msgkey" style="margin-top:18px">Ki-CAB · La evidencia entra a la cancha</div>`;
  }
  } // fin if(!skipScene)

  // Si un overlay de video cubre la pantalla, silencia/pausa el video de la escena (evita audio
  // cruzado). Al quitar el overlay, el video de la escena se reanuda donde quedó (sin reiniciar).
  const takeover = STATE.evento.loop_full || STATE.evento.musica || STATE.evento.empate || (STATE.evento.presentacion==="villar"||STATE.evento.presentacion==="cerda");
  document.querySelectorAll("#scene video").forEach(v=>{
    if(takeover){ v.muted=true; try{v.pause();}catch(_){} }
    else if(videoEscena){ v.muted = (e==="contexto"); try{ if(v.paused) v.play().catch(()=>{}); }catch(_){} }
  });

  // Animación de GOL (overlay 3s) al revelar el resultado con gol (una vez por ronda)
  const golT = (e==="resultado" && (STATE.evento.gol_ronda==="rapido" || STATE.evento.gol_ronda==="control"))
    ? ((enPenalesP()?"P"+(STATE.evento.penal||0):"Q"+(STATE.evento.caso_actual||0)) + ":" + STATE.evento.gol_ronda)
    : null;
  if(golT && golT!==lastGolKey){ lastGolKey = golT; showGolAnim(STATE.evento.gol_ronda); }
  if(e!=="resultado"){ const go=document.getElementById("golanim"); if(go && !golT){ go.classList.remove("show"); } }
}

function startTimer(){
  const el = document.getElementById("timer");
  const cntEl = document.getElementById("cnt");
  function tick(){
    const cron = STATE.evento.cronometro;
    const s = segRestantes(cron);
    if(el){ el.textContent = s; el.className = "timer" + (s<=5?" crit":(s<=10?" low":"")); }
    if(cntEl) cntEl.textContent = nRespuestas();
    if(s<=0 && STATE.evento.estado==="responder" && cron && cron.corriendo && !autoClosed){
      autoClosed = true;
      db.ref("evento").update({ estado:"bloqueo", cronometro:Object.assign({}, cron, {corriendo:false}) });
    }
  }
  tick();
  timerInt = setInterval(tick, 250);
}

/* Reacciones flotantes */
function floatReaction(emoji){
  const r = document.getElementById("reactions");
  const el = document.createElement("div"); el.className="rfly"; el.textContent=emoji;
  el.style.left = (8 + Math.random()*84) + "%"; el.style.bottom = "8%";
  r.appendChild(el); setTimeout(()=>el.remove(), 2700);
}

fbOnReady(()=>{
  document.getElementById("cfgnote").textContent = "";
  watchServerOffset(db);
  db.ref("evento").on("value", s => {
    const prev = STATE.evento.estado;
    STATE.evento = s.val() || {estado:"lobby",caso_actual:1};
    if(STATE.evento.estado==="responder" && prev!=="responder") autoClosed=false;
    render();
  });
  db.ref("equipos").on("value", s => { STATE.equipos = s.val() || {}; render(); });
  db.ref("jugadores").on("value", s => { STATE.jugadores = s.val() || {}; if(STATE.evento.estado!=="responder") render(); });
  db.ref("respuestas").on("value", s => { STATE.respuestas = s.val() || {}; });
  db.ref("var_solicitudes").on("value", s => {
    STATE.var_solicitudes = s.val() || {};
    if(Object.keys(STATE.var_solicitudes).length){ if(!alarmTimer) alarmTimer=setTimeout(()=>{ alarmTimer=null; db.ref("var_solicitudes").remove(); }, 10000); }
    else if(alarmTimer){ clearTimeout(alarmTimer); alarmTimer=null; }
    if(STATE.evento.estado==="resultado") render();
  });
  db.ref("reacciones").limitToLast(1).on("child_added", s => {
    if(s.key===lastReactKey) return; lastReactKey=s.key;
    const v = s.val(); if(v && v.emoji) floatReaction(v.emoji);
  });
});
render();
</script>
</body></html>
